<!DOCTYPE html>

<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Калькулятор печати</title>
  <link href="https://fonts.googleapis.com/css2?family=Geologica:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    :root {
      --bg: #f0f0ed;
      --card: #ffffff;
      --card2: #f7f7f5;
      --line: #e2e2de;
      --line-soft: #eeeeea;
      --text: #1a1a18;
      --muted: #6b6b66;
      --accent: #1a1a18;
      --accent-fg: #ffffff;
      --danger: #c0392b;
      --danger-soft: #fdf0ef;
      --green: #1a7a4a;
      --green-soft: #edf7f2;
      --radius: 16px;
      --radius-sm: 10px;
      --shadow: 0 2px 12px rgba(0,0,0,0.07);
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
    }

    body {
      margin: 0;
      font-family: 'Geologica', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    .app-header {
      background: var(--accent);
      color: var(--accent-fg);
      padding: 20px 32px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .app-logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .app-logo-icon {
      width: 36px;
      height: 36px;
      background: #fff;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .app-title {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin: 0;
    }

    .app-subtitle {
      font-size: 12px;
      opacity: 0.55;
      font-weight: 400;
      margin: 0;
    }

    .header-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    /* ── WRAP ── */
    .wrap {
      max-width: 1280px;
      margin: 0 auto;
      padding: 28px 24px 48px;
    }

    /* ── TOOLBAR ── */
    .toolbar {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .status-pill {
      font-size: 13px;
      color: var(--muted);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 6px 14px;
      min-height: 32px;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color 0.2s;
    }

    .status-pill.error { color: var(--danger); border-color: #f5c6c2; background: var(--danger-soft); }

    /* ── BUTTONS ── */
    button {
      cursor: pointer;
      border: none;
      border-radius: var(--radius-sm);
      padding: 10px 20px;
      font-weight: 700;
      font-size: 14px;
      font-family: inherit;
      transition: opacity 0.15s, transform 0.1s, box-shadow 0.15s;
    }

    button:hover { opacity: 0.88; }
    button:active { transform: scale(0.98); }

    .btn-primary {
      background: var(--accent);
      color: var(--accent-fg);
      box-shadow: 0 2px 8px rgba(0,0,0,0.18);
    }

    .btn-secondary {
      background: var(--card);
      color: var(--text);
      border: 1px solid var(--line);
    }

    .btn-danger {
      background: var(--danger-soft);
      color: var(--danger);
      border: 1px solid #f5c6c2;
    }

    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px dashed var(--line);
    }

    .btn-ghost:hover { color: var(--text); border-color: var(--text); opacity: 1; }

    .btn-sm { padding: 7px 14px; font-size: 13px; border-radius: 8px; }
    .btn-xs { padding: 5px 10px; font-size: 12px; border-radius: 7px; }

    .icon-btn {
      width: 36px;
      min-width: 36px;
      height: 36px;
      padding: 0;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: var(--card);
      font-size: 15px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .icon-btn.locked {
      background: var(--accent);
      color: var(--accent-fg);
      border-color: var(--accent);
    }

    .icon-btn.remove-extra {
      color: var(--danger);
      border-color: #f5c6c2;
      background: var(--danger-soft);
    }

    /* ── SERVICE CARD ── */
    .service-card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      margin-bottom: 20px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 18px 22px;
      border-bottom: 1px solid var(--line-soft);
      background: var(--card2);
    }

    .card-type-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--muted);
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 4px 10px;
      white-space: nowrap;
    }

    .card-type-badge.separator { color: #1a5fa0; border-color: #c3daf5; background: #eff6fd; }
    .card-type-badge.folding { color: #7a4a1a; border-color: #f5dfc3; background: #fdf6ef; }

    .card-name-input {
      flex: 1;
      min-width: 0;
      padding: 8px 12px;
      border: 1px solid transparent;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 700;
      font-family: inherit;
      background: transparent;
      color: var(--text);
      transition: border-color 0.15s, background 0.15s;
    }

    .card-name-input:focus {
      outline: none;
      border-color: var(--line);
      background: var(--card);
    }

    .card-body {
      padding: 22px;
    }

    /* ── GRID ── */
    .grid-2 {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }

    .col-span-full { grid-column: 1 / -1; }

    /* ── FIELD ── */
    .field { display: flex; flex-direction: column; gap: 6px; }

    .field label {
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    input[type="text"],
    input[type="number"],
    select {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-family: inherit;
      background: var(--card);
      color: var(--text);
      height: 42px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    input[type="text"]:focus,
    input[type="number"]:focus,
    select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(26,26,24,0.08);
    }

    input[type="number"] {
      text-align: center;
      -moz-appearance: textfield;
    }

    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button { display: none; }

    /* ── FILE UPLOAD AREA ── */
    .file-upload-area {
      border: 2px dashed var(--line);
      border-radius: var(--radius-sm);
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      background: var(--card2);
      position: relative;
    }

    .file-upload-area:hover,
    .file-upload-area.dragover {
      border-color: var(--accent);
      background: #f5f5f2;
    }

    .file-upload-area input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      height: 100%;
      width: 100%;
    }

    .file-upload-icon { font-size: 28px; margin-bottom: 8px; }
    .file-upload-label { font-size: 14px; font-weight: 600; color: var(--text); }
    .file-upload-hint { font-size: 12px; color: var(--muted); margin-top: 4px; }

    .file-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 10px;
    }

    .file-chip {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: var(--green-soft);
      border: 1px solid #b8e4cc;
      border-radius: 8px;
      font-size: 13px;
    }

    .file-chip-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--green); font-weight: 600; }
    .file-chip-remove { cursor: pointer; color: var(--muted); font-size: 16px; line-height: 1; padding: 0 2px; background: none; border: none; }
    .file-chip-remove:hover { color: var(--danger); }

    /* ── FOLDING OPTIONS ── */
    .fold-option-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 10px;
      margin-top: 14px;
    }

    .fold-option-card {
      border: 1.5px solid var(--line);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      user-select: none;
    }

    .fold-option-card:hover { border-color: var(--accent); }
    .fold-option-card.active { border-color: var(--accent); background: #f0f0ed; }

    .fold-option-title { font-size: 13px; font-weight: 700; }
    .fold-option-price { font-size: 12px; color: var(--muted); margin-top: 3px; }

    /* ── CARD FOOTER ── */
    .card-footer {
      padding: 16px 22px;
      border-top: 1px solid var(--line-soft);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: var(--card2);
    }

    /* ── RESULT SECTION ── */
    .result-section {
      border-top: 2px solid var(--line-soft);
      display: none;
    }

    .result-section.visible { display: block; }

    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 22px;
      cursor: pointer;
      user-select: none;
    }

    .result-header:hover { background: var(--card2); }

    .result-title { font-size: 15px; font-weight: 700; }
    .result-subtotal {
      font-size: 18px;
      font-weight: 800;
      color: var(--accent);
    }
    .result-chevron { font-size: 16px; color: var(--muted); transition: transform 0.2s; }
    .result-chevron.open { transform: rotate(180deg); }

    .result-body {
      padding: 0 22px 20px;
    }

    .result-body.collapsed { display: none; }

    /* ── DOWNLOAD ACTIONS ── */
    .download-actions {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    /* ── TABLE ── */
    .table-wrap {
      width: 100%;
      overflow-x: auto;
      border-radius: var(--radius-sm);
      border: 1px solid var(--line);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      min-width: 700px;
    }

    th, td {
      vertical-align: middle;
      padding: 11px 14px;
      border-bottom: 1px solid var(--line-soft);
      font-size: 13.5px;
    }

    th {
      background: #f7f7f5;
      font-weight: 700;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      color: var(--muted);
      white-space: nowrap;
      text-align: left;
    }

    td { text-align: left; }
    td.center { text-align: center; }
    td.right { text-align: right; }

    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafafa; }

    .cell-code { font-size: 12px; color: var(--muted); font-weight: 500; }
    .cell-label { font-size: 13px; font-weight: 500; line-height: 1.3; }
    .cell-size { font-size: 13px; font-family: monospace; color: var(--muted); }

    .sum-cell {
      font-size: 16px;
      font-weight: 800;
      white-space: nowrap;
      text-align: right !important;
    }

    .row-qty-input, .row-price-input {
      width: 90px;
      text-align: center;
      height: 36px;
      padding: 6px 10px;
      font-size: 13px;
    }

    .price-edit-box {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* ── NOTE ── */
    .note-box {
      margin-top: 14px;
      padding: 12px 16px;
      background: #fffbee;
      border: 1px solid #f0e0a0;
      border-radius: var(--radius-sm);
      font-size: 13px;
      line-height: 1.6;
      color: #5a4a00;
    }

    /* ── BOTTOM TOTAL ── */
    .bottom-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-top: 8px;
      flex-wrap: wrap;
    }

    .total-block {
      background: var(--accent);
      color: var(--accent-fg);
      border-radius: var(--radius);
      padding: 18px 28px;
      display: none;
    }

    .total-block.visible { display: block; }
    .total-label { font-size: 12px; opacity: 0.6; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
    .total-amount { font-size: 40px; font-weight: 800; letter-spacing: -1px; line-height: 1; }

    /* ── SEPARATOR PROGRESS ── */
    .progress-bar-wrap {
      height: 4px;
      background: var(--line);
      border-radius: 2px;
      margin-top: 10px;
      overflow: hidden;
      display: none;
    }

    .progress-bar-wrap.visible { display: block; }

    .progress-bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.3s;
      width: 0%;
    }

    /* ── HEADER BTN INVERSE ── */
    .btn-inverse {
      background: rgba(255,255,255,0.15);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.25);
      backdrop-filter: blur(4px);
    }

    .btn-inverse:hover { background: rgba(255,255,255,0.25); opacity: 1; }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    .empty-state-icon { font-size: 48px; margin-bottom: 16px; }
    .empty-state-title { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
    .empty-state-sub { font-size: 14px; }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .grid-2, .grid-3 { grid-template-columns: 1fr; }
      .app-header { padding: 14px 18px; }
      .wrap { padding: 18px 14px 40px; }
      .card-body, .result-body { padding: 16px; }
      .card-header, .card-footer { padding: 14px 16px; }
      .result-header { padding: 12px 16px; }
      .total-amount { font-size: 32px; }
      .bottom-bar { flex-direction: column; align-items: stretch; }
    }

    /* Drag & drop highlight */
    .service-card.drag-highlight { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(26,26,24,0.12); }
  </style>

</head>

      card.dataset.type = type;

      const typeBadge = type === "separator"

      const defaultName = type === "separator" ? `Разделитель #${id}` : `Фальцовка #${id}`;

      card.innerHTML = `

            <div class="progress-bar-fill" id="progress-bar-${id}"></div>
          </div>

        <div class="result-section" id="result-${id}">

          </div>

    function renderSeparatorBody(id) {

              <div class="file-upload-hint">Поддерживается несколько файлов</div>
            </div>
            <div class="file-list" id="file-list-${id}"></div>
          </div>
          <div class="field">
            <label>Режим цвета</label>
            <select id="sep-mode-${id}">
              <option value="auto">Автоопределение</option>

    function renderFoldingBody(id) {
      // Build fold options with price calculation info

        { key: "A2-A4", fromFmt: "A2", toFmt: "A4" },
        { key: "A1-A4", fromFmt: "A1", toFmt: "A4" },
        { key: "A2-A3", fromFmt: "A2", toFmt: "A3" },
        { key: "A1-A3", fromFmt: "A1", toFmt: "A3" },

      ];

      return `
        <div class="grid-2">
          <div class="field col-span-full">
            <label>PDF-файлы для определения форматов (необязательно)</label>
            <div class="file-upload-area" id="fold-upload-area-${id}">
              <input type="file" id="fold-files-${id}" accept="application/pdf" multiple>
              <div class="file-upload-icon">📂</div>
              <div class="file-upload-label">Нажмите или перетащите PDF-файлы</div>

    function bindCard(card, id, type) {
      // Remove
      card.querySelector(".remove-card-btn").addEventListener("click", () => {
        delete serviceStates[id];
        card.remove();
        rebuildRows();
        updateTotal();
      });

      // Calc
      card.querySelector(".calc-btn").addEventListener("click", () => calcBlock(card, id));

      // Result toggle
      const rHeader = document.getElementById(`result-header-${id}`);
      rHeader.addEventListener("click", () => {
        const state = serviceStates[id];
        state.collapsed = !state.collapsed;
        document.getElementById(`result-body-${id}`).classList.toggle("collapsed", state.collapsed);
        document.getElementById(`result-chevron-${id}`).classList.toggle("open", !state.collapsed);
      });

      if (type === "separator") {
        bindSeparatorFileInput(card, id);
      } else {
        bindFoldingOptions(card, id);
        bindFoldingFileInput(card, id);
      }
    }

    // ── FILE INPUT BINDING ─────────────────────────────────────────
    function bindSeparatorFileInput(card, id) {
      const input = document.getElementById(`sep-files-${id}`);
      const area = document.getElementById(`upload-area-${id}`);

      input.addEventListener("change", () => {
        addFilesToState(id, "separator", input.files);
        input.value = "";
        renderFileList(id, "separator");
      });

      area.addEventListener("dragover", e => { e.preventDefault(); area.classList.add("dragover"); });
      area.addEventListener("dragleave", () => area.classList.remove("dragover"));
      area.addEventListener("drop", e => {
        e.preventDefault();
        area.classList.remove("dragover");
        addFilesToState(id, "separator", e.dataTransfer.files);
        renderFileList(id, "separator");
      });
    }

    function bindFoldingFileInput(card, id) {
      const input = document.getElementById(`fold-files-${id}`);
      const area = document.getElementById(`fold-upload-area-${id}`);

      input.addEventListener("change", () => {
        addFilesToState(id, "folding", input.files);
        input.value = "";
        renderFileList(id, "folding");
      });

      area.addEventListener("dragover", e => { e.preventDefault(); area.classList.add("dragover"); });
      area.addEventListener("dragleave", () => area.classList.remove("dragover"));
      area.addEventListener("drop", e => {
        e.preventDefault();
        area.classList.remove("dragover");
        addFilesToState(id, "folding", e.dataTransfer.files);
        renderFileList(id, "folding");
      });
    }

    function addFilesToState(id, type, fileList) {
      const state = serviceStates[id];
      if (!state) return;

      const files = [...fileList].filter(f => f.type === "application/pdf" || f.name.endsWith(".pdf"));
      files.forEach(f => {
        if (!state.files.find(sf => sf.name === f.name)) {
          state.files.push({ name: f.name, fileRef: f, bytes: null });
        }
      });
    }

    function renderFileList(id, type) {
      const state = serviceStates[id];
      const listEl = document.getElementById(type === "separator" ? `file-list-${id}` : `fold-file-list-${id}`);
      if (!listEl || !state) return;

      if (!state.files.length) {
        listEl.innerHTML = "";
        return;
      }

      listEl.innerHTML = state.files.map((f, idx) => `
        <div class="file-chip">
          <span>📄</span>
          <span class="file-chip-name">${escapeHtml(f.name)}</span>
          <button class="file-chip-remove" data-idx="${idx}">×</button>
        </div>
      `).join("");

      listEl.querySelectorAll(".file-chip-remove").forEach(btn => {
        btn.addEventListener("click", () => {
          state.files.splice(Number(btn.dataset.idx), 1);
          renderFileList(id, type);
        });
      });
    }

    // ── FOLDING OPTIONS ────────────────────────────────────────────
    function bindFoldingOptions(card, id) {
      const optionsEl = document.getElementById(`fold-options-${id}`);
      const state = serviceStates[id];

      optionsEl.querySelectorAll(".fold-option-card").forEach(optCard => {
        optCard.addEventListener("click", () => {
          const key = optCard.dataset.key;
          optCard.classList.toggle("active");

          const idx = state.selectedFolds.findIndex(f => f.key === key);
          if (idx >= 0) {
            state.selectedFolds.splice(idx, 1);
          } else {
            state.selectedFolds.push({ key, qty: 1 });
          }

          renderFoldManualSection(id);
        });
      });
    }

    function renderFoldManualSection(id) {
      const state = serviceStates[id];
      const section = document.getElementById(`fold-manual-section-${id}`);
      if (!section) return;

      if (!state.selectedFolds.length) {
        section.innerHTML = "";
        return;
      }

      section.innerHTML = `
        <label style="font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.4px;display:block;margin-bottom:10px;">
          Количество листов по каждому типу фальцовки
        </label>
        <div class="grid-2">
          ${state.selectedFolds.map((f, idx) => {
            const tariff = FOLD_BASE_PRICES[f.key];
            return `
              <div class="field">
                <label>${tariff ? tariff.label : f.key}</label>
                <input type="number" class="fold-qty-input" data-idx="${idx}" min="1" step="1" value="${f.qty}">
              </div>
            `;
          }).join("")}
        </div>
      `;

      section.querySelectorAll(".fold-qty-input").forEach(inp => {
        inp.addEventListener("input", () => {
          const idx = Number(inp.dataset.idx);
          state.selectedFolds[idx].qty = Math.max(1, parseInt(inp.value) || 1);
        });
      });

    // ── CALCULATE ALL ──────────────────────────────────────────────
    async function calcAll() {
      const cards = [...document.querySelectorAll(".service-card")];
      for (const card of cards) {
        await calcBlock(card, Number(card.dataset.id));
      }
    }

    async function calcBlock(card, id) {
      const state = serviceStates[id];
      if (!state) return;

      setStatus("Идёт анализ...");

      try {
        if (state.type === "separator") {
          await calcSeparator(card, id);
        } else {
          await calcFolding(card, id);
        }

        renderResult(card, id);
        rebuildRows();
        updateTotal();
        setStatus("");
      } catch (err) {
        console.error(err);
        setStatus(err.message || "Ошибка расчёта.", true);
      }
    }

    // ── SEPARATOR CALC ─────────────────────────────────────────────
    async function calcSeparator(card, id) {
      const state = serviceStates[id];

      if (!state.files.length) throw new Error("Добавьте хотя бы один PDF-файл.");

      const printMode = document.getElementById(`sep-mode-${id}`).value;
      const copies = Math.max(1, parseInt(document.getElementById(`sep-copies-${id}`).value) || 1);

      const allRows = [];
      const notes = [];

      for (const fileEntry of state.files) {
        // Load bytes if needed
        if (!fileEntry.bytes) {
          fileEntry.bytes = new Uint8Array(await fileEntry.fileRef.arrayBuffer());
        }

        const rows = await analyzeSeparatorPdf(fileEntry, printMode, copies, id, state.files.length);
        allRows.push(...rows);
      }

      // Preserve extra rows
      const extraRows = (state.rows || []).filter(r => r.isExtra);
      state.rows = [...allRows, ...extraRows];
      state.notes = notes;
    }

    async function analyzeSeparatorPdf(fileEntry, printMode, copies, blockId, totalFiles) {
      const pdf = await pdfjsLib.getDocument({ data: fileEntry.bytes.slice() }).promise;
      const groupsMap = new Map();
      const totalPages = pdf.numPages;

      for (let i = 1; i <= totalPages; i++) {
        setProgress(blockId, i / totalPages * 100);
        setStatus(`Анализ ${fileEntry.name}: страница ${i}/${totalPages}`);

        const page = await pdf.getPage(i);
        const vp = page.getViewport({ scale: 1 });

        const wMm = ptToMm(vp.width);
        const hMm = ptToMm(vp.height);

        let colorMode = printMode === "auto" ? await detectColor(page) : printMode;

        const detected = detectFormat(wMm, hMm);
        const billed = detected !== "CUSTOM" ? detected : findSmallestFitting(wMm, hMm) || findNearest(wMm, hMm);

        // Exact size label (not rounded to standard)
        const actualLabel = buildExactSizeLabel(wMm, hMm, detected);

        const priceInfo = getSepPrice(billed, colorMode, copies);
        const groupKey = `${fileEntry.name}||${actualLabel}||${colorMode}||${billed}`;

        if (!groupsMap.has(groupKey)) {
          groupsMap.set(groupKey, {
            fileName: fileEntry.name,
            fileBytes: fileEntry.bytes,
            actualLabel,
            colorMode,
            billedFormat: billed,
            pages: [],
            qty: 0,
            priceInfo
          });
        }

        const g = groupsMap.get(groupKey);
        g.pages.push(i);
        g.qty += copies;
      }

      setProgress(blockId, 0);

      return [...groupsMap.values()].map(g => ({
        id: makeId(),
        blockId,
        fileName: g.fileName,
        fileBytes: g.fileBytes,
        actualLabel: g.actualLabel,
        colorMode: g.colorMode,
        billedFormat: g.billedFormat,
        pages: g.pages,
        qty: g.qty,
        copies,
        unitPrice: g.priceInfo.price,
        tariffCode: g.priceInfo.code,
        tariffLabel: g.priceInfo.label,
        priceLocked: false,
        isExtra: false,
        isSeparator: true,
        priceSyncKey: `${g.colorMode}:${g.billedFormat}`
      }));
    }

    // ── FOLDING CALC ───────────────────────────────────────────────
    async function calcFolding(card, id) {
      const state = serviceStates[id];
      const copies = Math.max(1, parseInt(document.getElementById(`fold-copies-${id}`).value) || 1);
      const rows = [];

      // If files uploaded, detect their formats and auto-populate qty
      if (state.files.length) {
        for (const fileEntry of state.files) {
          if (!fileEntry.bytes) {
            fileEntry.bytes = new Uint8Array(await fileEntry.fileRef.arrayBuffer());
          }

          const pdf = await pdfjsLib.getDocument({ data: fileEntry.bytes.slice() }).promise;
          const formatCounts = {};

          for (let i = 1; i <= pdf.numPages; i++) {
            const page = await pdf.getPage(i);
            const vp = page.getViewport({ scale: 1 });
            const fmt = detectFormat(ptToMm(vp.width), ptToMm(vp.height));
            const key = fmt !== "CUSTOM" ? fmt : "A4";
            formatCounts[key] = (formatCounts[key] || 0) + 1;
          }

          // Map detected formats to fold rows
          Object.entries(formatCounts).forEach(([fmt, count]) => {
            const foldKey = findFoldKey(fmt, state.selectedFolds);
            if (!foldKey) return;

            const tariff = FOLD_BASE_PRICES[foldKey];
            const calc = calcFoldPrice(fmt, foldKey);
            const qty = count * copies;

            rows.push({
              id: makeId(),
              blockId: id,
              actualLabel: fmt,
              colorMode: null,
              billedFormat: fmt,
              qty,
              copies,
              unitPrice: calc.price,
              tariffCode: tariff.code,
              tariffLabel: `${tariff.label} (${fmt}, ${calc.ratio.toFixed(2)}×)`,
              priceLocked: false,
              isExtra: false,
              isSeparator: false,
              foldKey
            });
          });
        }
      }

      // Manual selected folds
      if (!rows.length) {
        state.selectedFolds.forEach(sf => {
          const tariff = FOLD_BASE_PRICES[sf.key];
          if (!tariff) return;

          rows.push({
            id: makeId(),
            blockId: id,
            actualLabel: sf.key.split("-")[0],
            colorMode: null,
            billedFormat: "—",
            qty: sf.qty * copies,
            copies,
            unitPrice: tariff.price,
            tariffCode: tariff.code,
            tariffLabel: tariff.label,
            priceLocked: false,
            isExtra: false,
            isSeparator: false,
            foldKey: sf.key
          });
        });
      }

      if (!rows.length) throw new Error("Выберите тип фальцовки или загрузите PDF.");

      const extraRows = (state.rows || []).filter(r => r.isExtra);
      state.rows = [...rows, ...extraRows];
      state.notes = [];
    }

    // Calculates fold price proportionally based on sheet area relative to A2
    // A2→A4 = 18₽, A3→A4 = 18×(A3/A2) = 18×0.5 = 9₽
    // The base price comes from FOLD_BASE_PRICES for the target fold key
    function calcFoldPrice(fromFmt, foldKey) {
      const tariff = FOLD_BASE_PRICES[foldKey];
      if (!tariff) return { price: 5, ratio: 1 };

      // Find the base format for this fold key (e.g. A2-A4 → base = A2)
      const baseFmt = foldKey.split("-")[0];
      if (baseFmt === "custom") return { price: tariff.price, ratio: 1 };

      const baseArea = FORMAT_AREA[baseFmt] || 1;
      const fromArea = FORMAT_AREA[fromFmt] || 1;
      const ratio = fromArea / baseArea;
      const price = tariff.price * ratio;

      return { price: Math.round(price * 100) / 100, ratio };
    }

    function findFoldKey(fmt, selectedFolds) {
      if (!selectedFolds.length) return null;
      // Try to find matching fold key by source format
      const match = selectedFolds.find(sf => sf.key.startsWith(fmt + "-"));
      return match ? match.key : selectedFolds[0]?.key || null;
    }

    // ── GET SEPARATOR PRICE ────────────────────────────────────────
    function getSepPrice(fmt, colorMode, qty) {
      // BW tiered pricing for A4/A3
      if (colorMode === "bw" && PRICES.documentsBW[fmt]) {
        const tiers = PRICES.documentsBW[fmt];
        const tier = tiers.find(t => qty <= t.max) || tiers[tiers.length - 1];
        return { price: tier.price, code: tier.code, label: tier.label };
      }

      // Color A4/A3
      if (colorMode === "color" && PRICES.documentsColor[fmt]) {
        const info = PRICES.documentsColor[fmt];
        return {
          price: info.min, // minimum by default
          code: info.code,
          label: `${info.label} (от ${info.min} до ${info.max} ₽)`
        };
      }

      // Wide format drawings
      if (PRICES.drawingsExact[colorMode]?.[fmt]) {
        const t = PRICES.drawingsExact[colorMode][fmt];
        return { price: t.price, code: t.code, label: `Широкоформатная струйная печать, ${colorMode === "color" ? "цветн" : "ч/б"}, ${fmt}` };
      }

      // Wide multiplied formats
      const wide = parseWideKey(fmt);
      if (wide) {
        const tbl = PRICES.drawingsWide[colorMode]?.[wide.base];
        if (tbl && tbl[wide.n]) {
          return {
            price: tbl[wide.n],
            code: `wide-${colorMode}-${fmt}`,
            label: `Широкоформатная струйная печать, ${colorMode === "color" ? "цветн" : "ч/б"}, ${fmt}`
          };
        }
      }

      return { price: 0, code: "—", label: `Нет тарифа для ${fmt}` };
    }

    // ── RENDER RESULT ──────────────────────────────────────────────
    function renderResult(card, id) {
      const state = serviceStates[id];
      const resultEl = document.getElementById(`result-${id}`);
      const bodyEl = document.getElementById(`result-body-${id}`);
      const subtotalEl = document.getElementById(`result-subtotal-${id}`);

      if (!state.rows || !state.rows.length) {
        resultEl.classList.remove("visible");
        return;
      }

      resultEl.classList.add("visible");
      bodyEl.classList.toggle("collapsed", !!state.collapsed);
      document.getElementById(`result-chevron-${id}`).classList.toggle("open", !state.collapsed);

      const subtotal = state.rows.reduce((s, r) => s + r.qty * r.unitPrice, 0);
      subtotalEl.textContent = money(subtotal);

      let html = "";

      // Download buttons for separator
      const sepRows = state.rows.filter(r => r.isSeparator);
      if (sepRows.length) {
        html += `<div class="download-actions">
          <button type="button" class="btn-secondary btn-sm download-all-btn" data-id="${id}">⬇ Скачать всё (ZIP)</button>
        </div>`;
      }

      html += `<div class="table-wrap"><table>
        <thead>
          <tr>
            <th style="min-width:160px">Тариф</th>
            <th>Файл / формат</th>
            <th>Размер в файле</th>
            <th>Кол-во</th>
            <th>Цена / ед.</th>
            <th style="text-align:right">Сумма</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          ${state.rows.map(row => renderRowHtml(row)).join("")}
        </tbody>
      </table></div>`;

      if (state.notes && state.notes.length) {
        html += `<div class="note-box">${state.notes.map(n => `• ${escapeHtml(n)}`).join("<br>")}</div>`;
      }

      bodyEl.innerHTML = html;
      bindResultEvents(bodyEl, card, id);
    }

    function renderRowHtml(row) {
      const sum = row.qty * row.unitPrice;

      const priceCell = `
        <div class="price-edit-box">
          <input type="number" class="row-price-input row-price-editor" data-row-id="${row.id}"
                 value="${row.unitPrice.toFixed(2)}" min="0" step="0.01" style="width:90px;">
          <button type="button" class="icon-btn lock-btn ${row.priceLocked ? "locked" : ""}" data-row-id="${row.id}"
                  title="${row.priceLocked ? "Цена зафиксирована" : "Зафиксировать цену"}">
            ${row.priceLocked ? "🔒" : "🔓"}
          </button>
        </div>`;

      const removeBtn = row.isExtra
        ? `<button type="button" class="icon-btn remove-extra" data-row-id="${row.id}" title="Удалить">✕</button>`
        : "";

      const downloadBtn = row.isSeparator
        ? `<button type="button" class="btn-secondary btn-xs dl-row-btn" data-row-id="${row.id}">⬇ PDF</button>`
        : "";

      return `
        <tr data-row-id="${row.id}">
          <td>
            <div class="cell-code">${escapeHtml(row.tariffCode || "—")}</div>
            <div class="cell-label">${escapeHtml(row.tariffLabel || "—")}</div>
            ${downloadBtn}
          </td>
          <td>${escapeHtml(row.fileName || row.billedFormat || "—")}</td>
          <td class="cell-size">${escapeHtml(row.actualLabel || "—")}</td>
          <td class="center">
            <input type="number" class="row-qty-input row-qty-editor" data-row-id="${row.id}"
                   value="${row.qty}" min="1" step="1">
          </td>
          <td>${priceCell}</td>
          <td class="right sum-cell" data-row-id="${row.id}">${money(sum)}</td>
          <td>${removeBtn}</td>
        </tr>`;
    }

    function bindResultEvents(bodyEl, card, id) {
      const state = serviceStates[id];

      // Download all
      bodyEl.querySelector(".download-all-btn")?.addEventListener("click", () => downloadAll(id));

      // Download row
      bodyEl.querySelectorAll(".dl-row-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          const row = calculatedRows.find(r => r.id === btn.dataset.rowId);
          if (row) downloadRowPdf(row);
        });
      });

      // Remove extra
      bodyEl.querySelectorAll(".remove-extra").forEach(btn => {
        btn.addEventListener("click", () => {
          state.rows = state.rows.filter(r => r.id !== btn.dataset.rowId);
          rebuildRows();
          renderResult(card, id);
          updateTotal();
        });
      });

      // Price edit
      bodyEl.querySelectorAll(".row-price-editor").forEach(inp => {
        inp.addEventListener("input", () => {
          const row = calculatedRows.find(r => r.id === inp.dataset.rowId);
          if (!row) return;
          row.unitPrice = Math.max(0, parseFloat(inp.value.replace(",", ".")) || 0);
          updateRowSum(inp.dataset.rowId);
          updateSubtotal(id);
          updateTotal();
        });
      });

      // Lock
      bodyEl.querySelectorAll(".lock-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          const row = calculatedRows.find(r => r.id === btn.dataset.rowId);
          if (!row) return;
          row.priceLocked = !row.priceLocked;
          syncStateFromRows(id);
          renderResult(card, id);
        });
      });

      // Qty edit
      bodyEl.querySelectorAll(".row-qty-editor").forEach(inp => {
        inp.addEventListener("input", () => {
          const row = calculatedRows.find(r => r.id === inp.dataset.rowId);
          if (!row) return;
          row.qty = Math.max(1, parseInt(inp.value) || 1);

          // Recalc price based on qty if not locked
          if (!row.priceLocked && row.isSeparator) {
            const newPrice = getSepPrice(row.billedFormat, row.colorMode, row.qty);
            row.unitPrice = newPrice.price;
            row.tariffCode = newPrice.code;
            row.tariffLabel = newPrice.label;

            // Update price input display
            const priceInput = inp.closest("tbody")?.querySelector(`.row-price-editor[data-row-id="${row.id}"]`);
            if (priceInput) priceInput.value = row.unitPrice.toFixed(2);
          }

          updateRowSum(row.id);
          updateSubtotal(id);
          syncStateFromRows(id);
          updateTotal();
        });
      });
    }

    function updateRowSum(rowId) {
      const row = calculatedRows.find(r => r.id === rowId);
      const cell = document.querySelector(`.sum-cell[data-row-id="${rowId}"]`);
      if (row && cell) cell.textContent = money(row.qty * row.unitPrice);
    }

    function updateSubtotal(id) {
      const state = serviceStates[id];
      if (!state) return;
      const sub = state.rows.reduce((s, r) => s + r.qty * r.unitPrice, 0);
      const el = document.getElementById(`result-subtotal-${id}`);
      if (el) el.textContent = money(sub);
    }

    function syncStateFromRows(id) {
      const state = serviceStates[id];
      if (!state) return;
      state.rows = state.rows.map(r => calculatedRows.find(cr => cr.id === r.id) || r);
    }

    // ── DOWNLOAD ───────────────────────────────────────────────────
    async function downloadRowPdf(row) {
      if (!row.fileBytes || !row.pages?.length) {
        setStatus("Нет данных для скачивания.", true);
        return;
      }

      try {
        const bytes = await buildPdf(row.fileBytes, row.pages);
        const name = `${sanitize(row.billedFormat)}_${sanitize(row.colorMode || "")}_стр${compressRanges(row.pages)}.pdf`;
        downloadBytes(bytes, name, "application/pdf");
        setStatus("Файл скачан.");
      } catch (e) {
        setStatus("Ошибка при создании PDF.", true);
      }
    }

    async function downloadAll(id) {
      const state = serviceStates[id];
      if (!state) return;

      const sepRows = state.rows.filter(r => r.isSeparator && r.fileBytes && r.pages?.length);
      if (!sepRows.length) {
        setStatus("Нет файлов для скачивания.", true);
        return;
      }

      setStatus("Собирается архив...");

      try {
        const zip = new JSZip();

        for (const row of sepRows) {
          const bytes = await buildPdf(row.fileBytes, row.pages);
          const fname = `${sanitize(row.fileName || "file")}_${sanitize(row.billedFormat)}_${sanitize(row.colorMode || "bw")}_стр${compressRanges(row.pages)}.pdf`;
          zip.file(fname, bytes);
        }

        const blob = await zip.generateAsync({ type: "blob" });
        downloadBytes(blob, `разделитель_${id}.zip`, "application/zip");
        setStatus("Архив скачан.");
      } catch (e) {
        console.error(e);
        setStatus("Ошибка при создании архива.", true);
      }
    }

    async function buildPdf(sourceBytes, pages) {
      const src = await PDFDocument.load(sourceBytes.slice());
      const out = await PDFDocument.create();
      const copied = await out.copyPages(src, pages.map(p => p - 1));
      copied.forEach(p => out.addPage(p));
      return out.save();
    }

    function downloadBytes(data, name, mime) {
      const blob = data instanceof Blob ? data : new Blob([data], { type: mime });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = name;
      a.style.display = "none";
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 3000);
    }

    // ── ROWS / TOTAL ───────────────────────────────────────────────
    function rebuildRows() {
      calculatedRows = [];
      Object.values(serviceStates).forEach(state => {
        if (state.rows) calculatedRows.push(...state.rows);
      });
    }

    function updateTotal() {
      const total = calculatedRows.reduce((s, r) => s + r.qty * r.unitPrice, 0);
      if (calculatedRows.length) {
        totalBlock.classList.add("visible");
        totalAmount.textContent = money(total);
      } else {
        totalBlock.classList.remove("visible");
      }
    }

    // ── PROGRESS ───────────────────────────────────────────────────
    function setProgress(id, pct) {
      const wrap = document.getElementById(`progress-wrap-${id}`);
      const bar = document.getElementById(`progress-bar-${id}`);
      if (!wrap || !bar) return;

      if (pct > 0 && pct < 100) {
        wrap.classList.add("visible");
        bar.style.width = pct + "%";
      } else {
        wrap.classList.remove("visible");
        bar.style.width = "0%";
      }
    }

    // ── STATUS ─────────────────────────────────────────────────────
    function setStatus(text, isError = false) {
      if (!text) {
        statusEl.style.display = "none";
        return;
      }
      statusEl.style.display = "flex";
      statusEl.textContent = text;
      statusEl.className = "status-pill" + (isError ? " error" : "");
    }

    function clearAll() {
      container.innerHTML = "";
      blockCounter = 1;
      calculatedRows = [];
      Object.keys(serviceStates).forEach(k => delete serviceStates[k]);
      totalBlock.classList.remove("visible");
      setStatus("");
      addBlock("separator");
      addBlock("folding");
    }

    // ── PDF ANALYSIS ───────────────────────────────────────────────
    async function detectColor(page) {
      const vp = page.getViewport({ scale: 0.5 });
      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d", { willReadFrequently: true });
      canvas.width = Math.max(1, Math.floor(vp.width));
      canvas.height = Math.max(1, Math.floor(vp.height));

      await page.render({ canvasContext: ctx, viewport: vp }).promise;
      const { data, width, height } = ctx.getImageData(0, 0, canvas.width, canvas.height);

      let colorPx = 0;
      for (let y = 0; y < height; y += SAMPLE_STEP) {
        for (let x = 0; x < width; x += SAMPLE_STEP) {
          const i = (y * width + x) * 4;
          const r = data[i], g = data[i + 1], b = data[i + 2], a = data[i + 3];
          if (a < 10) continue;
          if (Math.abs(r - g) > COLOR_TOLERANCE || Math.abs(g - b) > COLOR_TOLERANCE || Math.abs(r - b) > COLOR_TOLERANCE) {
            if (++colorPx >= 5) return "color";
          }
        }
      }

      return "bw";
    }

    function detectFormat(w, h) {
      for (const [name, size] of Object.entries(FORMATS)) {
        const n = Math.abs(w - size.w) <= TOLERANCE_MM && Math.abs(h - size.h) <= TOLERANCE_MM;
        const r = Math.abs(w - size.h) <= TOLERANCE_MM && Math.abs(h - size.w) <= TOLERANCE_MM;
        if (n || r) return name;
      }
      return "CUSTOM";
    }

    function findSmallestFitting(w, h) {
      const short = Math.min(w, h), long = Math.max(w, h);
      for (const name of ["A6","A5","A4","A3","A2","A1","A0"]) {
        const s = FORMATS[name];
        const fs = Math.min(s.w, s.h), fl = Math.max(s.w, s.h);
        if (short <= fs + TOLERANCE_MM && long <= fl + TOLERANCE_MM) return name;
      }
      return null;
    }

    function findNearest(w, h) {
      let best = "A4", bestDist = Infinity;
      Object.entries(FORMATS).forEach(([name, size]) => {
        const d = Math.min(
          Math.abs(w - size.w) + Math.abs(h - size.h),
          Math.abs(w - size.h) + Math.abs(h - size.w)
        );
        if (d < bestDist) { bestDist = d; best = name; }
      });
      return best;
    }

    // Exact size label — shows real mm from file without rounding to standard
    function buildExactSizeLabel(wMm, hMm, detectedFmt) {
      const w = Math.round(wMm * 10) / 10;
      const h = Math.round(hMm * 10) / 10;
      // Show exact dimensions
      return `${w} × ${h} мм`;
    }

    function parseWideKey(key) {
      const m = /^([A][234])x(\d+)$/i.exec(String(key));
      return m ? { base: m[1].toUpperCase(), n: Number(m[2]) } : null;
    }

    // ── UTILS ──────────────────────────────────────────────────────
    function ptToMm(pt) { return pt * 25.4 / 72; }

    function money(v) {
      return `${Number(v).toFixed(2).replace(".", ",")} ₽`;
    }

    function escapeHtml(t) {
      return String(t).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }

    function sanitize(v) {
      return String(v || "").replace(/[\\/:*?"<>|]+/g, "_");
    }

    function makeId() {
      return "r_" + Math.random().toString(36).slice(2, 10);
    }

    function compressRanges(pages) {
      if (!pages?.length) return "";
      const sorted = [...new Set(pages)].sort((a, b) => a - b);
      const ranges = [];
      let start = sorted[0], prev = sorted[0];
      for (let i = 1; i < sorted.length; i++) {
        if (sorted[i] === prev + 1) { prev = sorted[i]; continue; }
        ranges.push(start === prev ? `${start}` : `${start}-${prev}`);
        start = prev = sorted[i];
      }
      ranges.push(start === prev ? `${start}` : `${start}-${prev}`);
      return ranges.join(",");
    }
  </script>
