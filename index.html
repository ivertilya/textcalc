        <option value="single">Односторонняя</option>
        <option value="double">Двусторонняя</option>

    <div>
      <label style="display:block;margin-bottom:8px;font-weight:700;">Количество экземпляров</label>
      <input type="number" id="copiesCount" min="1" value="1" style="width:100%;padding:12px;border:1px solid #ccc;border-radius:10px;">
    </div>

    <div>
      <label style="display:block;margin-bottom:8px;font-weight:700;">Ламинирование</label>
      <select id="laminationType" style="width:100%;padding:12px;border:1px solid #ccc;border-radius:10px;">
        <option value="none">Без ламинирования</option>
        <option value="auto">По формату страниц</option>
      </select>
    </div>

    <div>
      <label style="display:block;margin-bottom:8px;font-weight:700;">Брошюровка</label>

        <option value="none">Без брошюровки</option>

        <option value="plastic">Пластиковая пружина</option>
        <option value="metal">Металлическая пружина</option>
        <option value="hardcover">Твердый переплет A4</option>

    <div>
      <label style="display:block;margin-bottom:8px;font-weight:700;">Мультифоры</label>
      <select id="multiforaFormat" style="width:100%;padding:12px;border:1px solid #ccc;border-radius:10px;">
        <option value="none">Не нужны</option>
        <option value="A5">A5</option>
        <option value="A4">A4</option>
        <option value="A3">A3</option>
      </select>
    </div>

    <div>
      <label style="display:block;margin-bottom:8px;font-weight:700;">Количество мультифор</label>
      <input type="number" id="multiforaCount" min="0" value="0" style="width:100%;padding:12px;border:1px solid #ccc;border-radius:10px;">
    </div>

    <div>
      <label style="display:block;margin-bottom:8px;font-weight:700;">Папка</label>
      <select id="folderType" style="width:100%;padding:12px;border:1px solid #ccc;border-radius:10px;">
        <option value="none">Без папки</option>
        <option value="folder20">Папка на 20 мультифор</option>
        <option value="folder30">Папка на 30 мультифор</option>
        <option value="folder40">Папка на 40 мультифор</option>
        <option value="folder60">Папка на 60 мультифор</option>
      </select>
    </div>
  </div>

  <div style="margin-top:20px;display:flex;gap:12px;flex-wrap:wrap;">
    <button id="analyzeBtn" style="padding:14px 22px;border:none;border-radius:10px;background:#111;color:#fff;cursor:pointer;font-weight:700;">
      Рассчитать
    </button>
    <button id="resetBtn" type="button" style="padding:14px 22px;border:1px solid #ccc;border-radius:10px;background:#fff;color:#111;cursor:pointer;font-weight:700;">
      Сбросить

  <div id="status" style="margin-top:16px;color:#444;font-size:14px;"></div>

  <div id="resultBox" style="display:none;margin-top:24px;padding:20px;border:1px solid #e5e5e5;border-radius:14px;background:#fafafa;">

    <div id="summaryTop" style="margin-bottom:16px;font-size:15px;line-height:1.6;"></div>

      <thead>
        <tr>
          <th style="text-align:left;padding:10px;border-bottom:1px solid #ddd;">Позиция</th>

          <th style="text-align:left;padding:10px;border-bottom:1px solid #ddd;">Кол-во</th>

          <th style="text-align:left;padding:10px;border-bottom:1px solid #ddd;">Сумма</th>
        </tr>
      </thead>

    </table>

    <div id="totalPrice" style="margin-top:18px;font-size:24px;font-weight:700;"></div>

    <div id="customSizesBox" style="display:none;margin-top:24px;">

      </table>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>

  const TOLERANCE_MM = 8;

      },

    },

    binding: {

      hardcoverA4: { price: 550.0, code: "1084", label: "Твердый переплет MetalBind, обложка O.hardCOVER, формат А4, книжн." },

          { max: 340, price: 260.0, code: "1090", label: "Брошюровка на пласт.пружину, формат А4, 38мм, до 340л" },
          { max: 500, price: 290.0, code: "1091", label: "Брошюровка на пласт.пружину, формат А4, 51мм, до 500л" }
        ],
        A3: [
          { max: 40, price: 135.0, code: "1092", label: "Брошюровка на пласт.пружину, формат А3, 8мм, до 40л" },
          { max: 80, price: 165.0, code: "1093", label: "Брошюровка на пласт.пружину, формат А3, 12мм, до 80л" },

          { max: 180, price: 225.0, code: "1095", label: "Брошюровка на пласт.пружину, формат А3, 22мм, до 180л" },
          { max: 240, price: 255.0, code: "1096", label: "Брошюровка на пласт.пружину, формат А3, 28мм, до 240л" },
          { max: 340, price: 285.0, code: "1097", label: "Брошюровка на пласт.пружину, формат А3, 38мм, до 340л" },
          { max: 500, price: 315.0, code: "1098", label: "Брошюровка на пласт.пружину, формат А3, 51мм, до 500л" }
        ]
      },

      metal: {
        A4: [
          { max: 35, price: 125.0, code: "1099", label: "Брошюровка на металл.пружину, формат А4, 6мм, до 35л" },
          { max: 50, price: 140.0, code: "1100", label: "Брошюровка на металл.пружину, формат А4, 8мм, до 50л" },
          { max: 80, price: 155.0, code: "1101", label: "Брошюровка на металл.пружину, формат А4, 10мм, до 80л" },
          { max: 100, price: 170.0, code: "1102", label: "Брошюровка на металл.пружину, формат А4, 12мм, до 100л" },
          { max: 120, price: 185.0, code: "1103", label: "Брошюровка на металл.пружину, формат А4, 14мм, до 120л" }
        ],
        A3: [
          { max: 35, price: 150.0, code: "1104", label: "Брошюровка на металл.пружину, формат А3, 6мм, до 35л" },
          { max: 50, price: 165.0, code: "1105", label: "Брошюровка на металл.пружину, формат А3, 8мм, до 50л" },
          { max: 80, price: 180.0, code: "1106", label: "Брошюровка на металл.пружину, формат А3, 10мм, до 80л" },
          { max: 100, price: 195.0, code: "1107", label: "Брошюровка на металл.пружину, формат А3, 12мм, до 100л" },
          { max: 120, price: 210.0, code: "1108", label: "Брошюровка на металл.пружину, формат А3, 14мм, до 120л" }
        ]
      }
    },

    multifora: {
      A5: { price: 5.0, code: "1178", label: "Папка-вкладыш с перфорацией А5 (мульфора)" },
      A4: { price: 7.0, code: "1179", label: "Папка-вкладыш с перфорацией А4 (мульфора)" },
      A3: { price: 14.0, code: "1180", label: "Папка-вкладыш с перфорацией А3 (мульфора)" }
    },

    folders: {
      folder20: { name: "Папка на 20 мультифор", price: 200.0, code: "1172", label: "Папка на 20 мультифор" },
      folder30: { name: "Папка на 30 мультифор", price: 250.0, code: "1173", label: "Папка на 30 мультифор" },
      folder40: { name: "Папка на 40 мультифор", price: 300.0, code: "1174", label: "Папка на 40 мультифор" },
      folder60: { name: "Папка на 60 мультифор", price: 350.0, code: "1175", label: "Папка на 60 мультифор" }
    }
  };

  const pdfFileInput = document.getElementById("pdfFile");
  const fileInfo = document.getElementById("fileInfo");
  const analyzeBtn = document.getElementById("analyzeBtn");
  const resetBtn = document.getElementById("resetBtn");
  const statusBox = document.getElementById("status");
  const resultBox = document.getElementById("resultBox");
  const resultTable = document.getElementById("resultTable");
  const totalPrice = document.getElementById("totalPrice");
  const summaryTop = document.getElementById("summaryTop");
  const customSizesBox = document.getElementById("customSizesBox");
  const customSizesTable = document.getElementById("customSizesTable");

  pdfFileInput.addEventListener("change", () => {
    const file = pdfFileInput.files[0];
    fileInfo.textContent = file ? `Файл: ${file.name} (${formatBytes(file.size)})` : "";
  });

  analyzeBtn.addEventListener("click", async () => {
    const file = pdfFileInput.files[0];
    if (!file) return setStatus("Сначала выберите PDF-файл.", true);
    if (file.type !== "application/pdf") return setStatus("Поддерживается только PDF.", true);

    try {
      setStatus("Анализирую PDF...");
      resultBox.style.display = "none";
      resultTable.innerHTML = "";
      customSizesTable.innerHTML = "";
      customSizesBox.style.display = "none";

      const copiesCount = Math.max(1, parseInt(document.getElementById("copiesCount").value || "1", 10));
      const sidesType = document.getElementById("sidesType").value;
      const laminationType = document.getElementById("laminationType").value;
      const bindingType = document.getElementById("bindingType").value;
      const multiforaFormat = document.getElementById("multiforaFormat").value;
      const multiforaCount = Math.max(0, parseInt(document.getElementById("multiforaCount").value || "0", 10));
      const folderType = document.getElementById("folderType").value;

      const arrayBuffer = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;

      const pages = [];
      for (let i = 1; i <= pdf.numPages; i++) {
        setStatus(`Анализирую PDF... страница ${i} из ${pdf.numPages}`);
        const page = await pdf.getPage(i);
        const viewport = page.getViewport({ scale: 1 });

        const widthMm = ptToMm(viewport.width);
        const heightMm = ptToMm(viewport.height);

        const exactFormat = detectFormat(widthMm, heightMm);
        const nearestFormat = exactFormat === "CUSTOM"
          ? findNearestPrintableFormat(widthMm, heightMm)
          : exactFormat;

        const colorMode = await detectPageColorMode(page);

        pages.push({
          pageNumber: i,
          widthMm: round1(widthMm),
          heightMm: round1(heightMm),
          exactFormat,
          billedFormat: nearestFormat,
          colorMode
        });
      }

      const stats = buildStats(pages, copiesCount);
      const items = [];
      let total = 0;

      // ПЕЧАТЬ A4/A3 отдельно по цвету и ч/б
      for (const format of ["A4", "A3"]) {
        const bwCount = stats.print[format].bw;
        const colorCount = stats.print[format].color;

        if (bwCount > 0) {
          const tier = getTierRow(PRICES.digitalBW[format], bwCount);
          const sum = bwCount * tier.price;
          total += sum;

          items.push({
            name: `Печать документов, ч/б, ${format}`,
            tariff: `${tier.code} — ${tier.label}`,
            qty: `${bwCount} стр.`,
            price: money(tier.price),
            sum: money(sum)
          });
        }

        if (colorCount > 0) {
          const colorRow = PRICES.digitalColor[format][sidesType];
          const sum = colorCount * colorRow.price;
          total += sum;

          items.push({
            name: `Печать документов, цвет, ${format}, ${sidesType === "single" ? "1 сторона" : "2 стороны"}`,
            tariff: `${colorRow.code} — ${colorRow.label}`,
            qty: `${colorCount} стр.`,
            price: money(colorRow.price),
            sum: money(sum)
          });
        }
      }

      // Нестандартные форматы, округляем к A4/A3/A2/A1/A0/SRA3 и показываем отдельно
      if (stats.customPages.length > 0) {
        renderCustomPages(stats.customPages);
      }

      // ЛАМИНИРОВАНИЕ
      if (laminationType === "auto") {
        for (const format of ["A6", "A5", "A4", "A3"]) {
          const lamCount = stats.lamination[format];
          if (!lamCount) continue;

          const lamRow = PRICES.lamination[format];
          const sum = lamCount * lamRow.price;
          total += sum;

          items.push({
            name: `Ламинирование ${format}`,
            tariff: `${lamRow.code} — ${lamRow.label}`,
            qty: `${lamCount} шт.`,
            price: money(lamRow.price),
            sum: money(sum)
          });
        }
      }

      // БРОШЮРОВКА
      if (bindingType !== "none") {
        const bindingBaseFormat = getBindingBaseFormat(stats);
        const bindingSheetsPerCopy = getBindingSheetsPerCopy(stats, sidesType, bindingBaseFormat);

        if (bindingType === "staples2") {
          const row = PRICES.binding.staples2;
          const sum = row.price * copiesCount;
          total += sum;
          items.push({
            name: `Брошюровка на 2 скобы (${bindingBaseFormat})`,
            tariff: `${row.code} — ${row.label}`,
            qty: `${copiesCount} экз.`,
            price: money(row.price),
            sum: money(sum)
          });
        }

        if (bindingType === "hardcover") {
          const row = PRICES.binding.hardcoverA4;
          const sum = row.price * copiesCount;
          total += sum;
          items.push({
            name: `Твердый переплет A4`,
            tariff: `${row.code} — ${row.label}`,
            qty: `${copiesCount} экз.`,
            price: money(row.price),
            sum: money(sum)
          });
        }

        if (bindingType === "plastic" || bindingType === "metal") {
          const rows = PRICES.binding[bindingType][bindingBaseFormat];
          const selectedRow = findBindingRow(rows, bindingSheetsPerCopy);

          if (selectedRow) {
            const sum = selectedRow.price * copiesCount;
            total += sum;

            items.push({
              name: `Брошюровка на ${bindingType === "plastic" ? "пласт." : "металл."} пружину ${bindingBaseFormat}`,
              tariff: `${selectedRow.code} — ${selectedRow.label}`,
              qty: `${copiesCount} экз. × ${bindingSheetsPerCopy} л.`,
              price: money(selectedRow.price),
              sum: money(sum)
            });
          } else {
            items.push({
              name: `Брошюровка на ${bindingType === "plastic" ? "пласт." : "металл."} пружину ${bindingBaseFormat}`,
              tariff: "—",
              qty: `${copiesCount} экз. × ${bindingSheetsPerCopy} л.`,
              price: "—",
              sum: "Объём превышает прайс"
            });
          }
        }
      }

      // МУЛЬТИФОРЫ
      if (multiforaFormat !== "none" && multiforaCount > 0) {
        const row = PRICES.multifora[multiforaFormat];
        const sum = row.price * multiforaCount;
        total += sum;

        items.push({
          name: `Мультифоры ${multiforaFormat}`,
          tariff: `${row.code} — ${row.label}`,
          qty: `${multiforaCount} шт.`,
          price: money(row.price),
          sum: money(sum)
        });
      }

      // ПАПКА
      if (folderType !== "none") {
        const row = PRICES.folders[folderType];
        total += row.price;

        items.push({
          name: row.name,
          tariff: `${row.code} — ${row.label}`,
          qty: `1 шт.`,
          price: money(row.price),
          sum: money(row.price)
        });
      }

      renderTable(items);

      summaryTop.innerHTML = `
        <strong>Страниц в файле:</strong> ${pdf.numPages}<br>
        <strong>Экземпляров:</strong> ${copiesCount}<br>
        <strong>A4 ч/б:</strong> ${stats.print.A4.bw} стр. &nbsp; | &nbsp;
        <strong>A4 цвет:</strong> ${stats.print.A4.color} стр.<br>
        <strong>A3 ч/б:</strong> ${stats.print.A3.bw} стр. &nbsp; | &nbsp;
        <strong>A3 цвет:</strong> ${stats.print.A3.color} стр.<br>
        <strong>Нестандартных страниц:</strong> ${stats.customPages.length}<br>
        <strong>Листов для брошюровки на 1 экземпляр:</strong> ${getBindingSheetsPerCopy(stats, sidesType, getBindingBaseFormat(stats))} л.
      `;

      totalPrice.textContent = `Итого: ${money(total)}`;
      resultBox.style.display = "block";
      setStatus("Готово.");
    } catch (error) {
      console.error(error);
      setStatus("Не удалось обработать PDF. Проверьте файл.", true);
    }
  });

  resetBtn.addEventListener("click", () => {
    pdfFileInput.value = "";
    fileInfo.textContent = "";
    statusBox.textContent = "";
    resultBox.style.display = "none";
    resultTable.innerHTML = "";
    totalPrice.textContent = "";
    summaryTop.innerHTML = "";
    customSizesTable.innerHTML = "";
    customSizesBox.style.display = "none";
    document.getElementById("sidesType").value = "single";
    document.getElementById("copiesCount").value = "1";
    document.getElementById("laminationType").value = "none";
    document.getElementById("bindingType").value = "none";
    document.getElementById("multiforaFormat").value = "none";
    document.getElementById("multiforaCount").value = "0";
    document.getElementById("folderType").value = "none";
  });

  function ptToMm(pt) {
    return pt * 25.4 / 72;
  }

  function round1(num) {
    return Math.round(num * 10) / 10;
  }

  function money(value) {
    return `${Number(value).toFixed(2)} ₽`;
  }

  function formatBytes(bytes) {
    if (bytes < 1024) return bytes + " B";
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
    return (bytes / (1024 * 1024)).toFixed(1) + " MB";
  }

  function setStatus(text, isError = false) {
    statusBox.textContent = text;
    statusBox.style.color = isError ? "#c62828" : "#444";
  }

  function detectFormat(widthMm, heightMm) {
    for (const [name, size] of Object.entries(FORMATS)) {
      const normalMatch =
        Math.abs(widthMm - size.w) <= TOLERANCE_MM &&
        Math.abs(heightMm - size.h) <= TOLERANCE_MM;

      const rotatedMatch =
        Math.abs(widthMm - size.h) <= TOLERANCE_MM &&
        Math.abs(heightMm - size.w) <= TOLERANCE_MM;

      if (normalMatch || rotatedMatch) return name;
    }
    return "CUSTOM";
  }

  function distanceToFormat(widthMm, heightMm, size) {
    const d1 = Math.abs(widthMm - size.w) + Math.abs(heightMm - size.h);
    const d2 = Math.abs(widthMm - size.h) + Math.abs(heightMm - size.w);
    return Math.min(d1, d2);
  }

  function findNearestPrintableFormat(widthMm, heightMm) {
    const candidates = ["A4", "A3", "A2", "A1", "A0", "SRA3", "A5", "A6"];
    let best = candidates[0];
    let bestDistance = Infinity;

    for (const name of candidates) {
      const dist = distanceToFormat(widthMm, heightMm, FORMATS[name]);
      if (dist < bestDistance) {
        bestDistance = dist;
        best = name;
      }
    }
    return best;
  }

  async function detectPageColorMode(page) {
    // Это эвристика: если на странице есть заметное количество несерых пикселей,
    // считаем её цветной. Для большинства офисных PDF этого достаточно.
    const viewport = page.getViewport({ scale: 0.5 });
    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d", { willReadFrequently: true });

    canvas.width = Math.max(1, Math.floor(viewport.width));
    canvas.height = Math.max(1, Math.floor(viewport.height));

    await page.render({ canvasContext: ctx, viewport }).promise;

    const { data, width, height } = ctx.getImageData(0, 0, canvas.width, canvas.height);
    let coloredPixels = 0;
    let checked = 0;

    for (let y = 0; y < height; y += SAMPLE_STEP) {
      for (let x = 0; x < width; x += SAMPLE_STEP) {
        const idx = (y * width + x) * 4;
        const r = data[idx];
        const g = data[idx + 1];
        const b = data[idx + 2];
        const a = data[idx + 3];

        if (a < 10) continue; // прозрачность игнорируем
        checked++;

        const diffRG = Math.abs(r - g);
        const diffGB = Math.abs(g - b);
        const diffRB = Math.abs(r - b);

        if (diffRG > COLOR_TOLERANCE || diffGB > COLOR_TOLERANCE || diffRB > COLOR_TOLERANCE) {
          coloredPixels++;
          if (coloredPixels >= 5) return "color";
        }
      }
    }

    return "bw";
  }

  function buildStats(pages, copiesCount) {
    const stats = {
      print: {
        A4: { bw: 0, color: 0 },
        A3: { bw: 0, color: 0 }
      },
      lamination: {
        A6: 0, A5: 0, A4: 0, A3: 0
      },
      pagesOneCopyByBilledFormat: {
        A4: 0, A3: 0, A2: 0, A1: 0, A0: 0, SRA3: 0, A5: 0, A6: 0
      },
      customPages: []
    };

    pages.forEach(p => {
      // Для печати считаем только A4/A3.
      if (p.billedFormat === "A4" || p.billedFormat === "A3") {
        stats.print[p.billedFormat][p.colorMode] += copiesCount;
      }

      if (stats.lamination[p.billedFormat] !== undefined) {
        stats.lamination[p.billedFormat] += copiesCount;
      }

      if (stats.pagesOneCopyByBilledFormat[p.billedFormat] !== undefined) {
        stats.pagesOneCopyByBilledFormat[p.billedFormat] += 1;
      }

      if (p.exactFormat === "CUSTOM") {
        stats.customPages.push({
          pageNumber: p.pageNumber,
          widthMm: p.widthMm,
          heightMm: p.heightMm,
          billedFormat: p.billedFormat,
          colorMode: p.colorMode
        });
      }
    });

    return stats;
  }

  function getTierRow(tiers, qty) {
    for (const tier of tiers) {
      if (qty <= tier.max) return tier;
    }
    return tiers[tiers.length - 1];
  }

  function getBindingBaseFormat(stats) {
    // Если есть A3 и нет A4 — считаем A3.
    // Во всех смешанных случаях по умолчанию A4.
    const a3Pages = stats.pagesOneCopyByBilledFormat.A3;
    const a4Pages = stats.pagesOneCopyByBilledFormat.A4;
    if (a3Pages > 0 && a4Pages === 0) return "A3";
    return "A4";
  }

  function getBindingSheetsPerCopy(stats, sidesType, bindingBaseFormat) {
    const pagesPerCopy = stats.pagesOneCopyByBilledFormat[bindingBaseFormat] || 0;
    if (pagesPerCopy === 0) return 0;
    return sidesType === "double" ? Math.ceil(pagesPerCopy / 2) : pagesPerCopy;
  }

  function findBindingRow(rows, sheetCount) {
    return rows.find(r => sheetCount <= r.max) || null;
  }

  function renderTable(items) {
    resultTable.innerHTML = "";
    items.forEach(item => {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td style="padding:10px;border-bottom:1px solid #eee;">${item.name}</td>
        <td style="padding:10px;border-bottom:1px solid #eee;">${item.tariff}</td>
        <td style="padding:10px;border-bottom:1px solid #eee;">${item.qty}</td>
        <td style="padding:10px;border-bottom:1px solid #eee;">${item.price}</td>
        <td style="padding:10px;border-bottom:1px solid #eee;">${item.sum}</td>
      `;
      resultTable.appendChild(tr);
    });
  }

  function renderCustomPages(customPages) {
    customSizesTable.innerHTML = "";
    customPages.forEach(p => {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td style="padding:10px;border-bottom:1px solid #eee;">${p.pageNumber}</td>
        <td style="padding:10px;border-bottom:1px solid #eee;">${p.widthMm} × ${p.heightMm} мм</td>
        <td style="padding:10px;border-bottom:1px solid #eee;">${p.billedFormat}</td>
        <td style="padding:10px;border-bottom:1px solid #eee;">${p.colorMode === "color" ? "цвет" : "ч/б"}</td>
      `;
      customSizesTable.appendChild(tr);
    });
    customSizesBox.style.display = "block";
  }
</script>
