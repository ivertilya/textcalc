<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Калькулятор печати</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f6f6f7;
      color: #111;
    }

    .wrap {
      max-width: 1280px;
      margin: 0 auto;
      padding: 18px 24px 24px;
    }

    .top-bar {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 32px;
    }

    .top-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin: 0;
    }

    .status-inline {
      font-size: 14px;
      color: #444;
      min-height: 20px;
      display: flex;
      align-items: center;
    }

    button {
      cursor: pointer;
      border: none;
      border-radius: 12px;
      padding: 12px 18px;
      font-weight: 700;
      font-size: 14px;
    }

    .btn-primary {
      background: #111;
      color: #fff;
    }

    .btn-secondary {
      background: #fff;
      color: #111;
      border: 1px solid #ccc;
    }

    .btn-danger {
      background: #fff;
      color: #b00020;
      border: 1px solid #e0b4b4;
      margin-top: 0;
      align-self: flex-start;
    }

    .service-card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 18px;
      padding: 18px;
      margin-bottom: 14px;
    }

    .service-header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .service-header-main {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
    }

    .service-title {
      font-size: 20px;
      font-weight: 700;
      margin: 0 0 10px;
    }

    .service-name-input {
      width: 100%;
      max-width: 420px;
      margin: 0;
      padding: 10px 12px;
      border: 1px solid #ccc;
      border-radius: 12px;
      font-size: 14px;
      background: #fff;
    }

    .service-type-buttons {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      width: 100%;
      gap: 8px;
      margin-bottom: 14px;
    }

    .service-type-btn {
      width: 100%;
      padding: 12px 8px;
      border-radius: 12px 12px 0 0;
      border: 1px solid #d8d8d8;
      border-bottom: none;
      background: #ececec;
      color: #111;
      font-weight: 700;
      cursor: pointer;
      text-align: center;
    }

    .service-type-btn.active {
      background: #fff;
      color: #111;
      position: relative;
      top: 1px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .grid-4 {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .field label {
      font-size: 14px;
      font-weight: 700;
    }

    input[type="text"],
    input[type="number"],
    input[type="file"],
    select {
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 12px;
      font-size: 14px;
      background: #fff;
    }

    input[type="file"] {
      padding: 10px;
    }

    .hint {
      font-size: 12px;
      color: #666;
      line-height: 1.4;
    }

    .extras-box {
      margin-top: 18px;
      border: 1px solid #eee;
      border-radius: 14px;
      background: #fafafa;
      overflow: hidden;
    }

    .extras-toggle {
      width: 100%;
      background: transparent;
      border: none;
      border-radius: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 16px;
      color: #111;
      font-size: 16px;
      font-weight: 700;
      text-align: left;
    }

    .extras-toggle:hover {
      background: #f3f3f3;
    }

    .extras-title {
      font-size: 16px;
      font-weight: 700;
      margin: 0;
    }

    .extras-chevron {
      font-size: 18px;
      line-height: 1;
      flex: 0 0 auto;
    }

    .extras-content {
      display: none;
      padding: 0 16px 16px;
    }

    .extras-content.open {
      display: block;
    }

    .service-result {
      margin-top: 20px;
      padding-top: 18px;
      border-top: 1px solid #eee;
    }

    .service-result-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .table-wrap {
      overflow-x: auto;
      margin-top: 12px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 900px;
      background: #fff;
      table-layout: fixed;
    }

    th, td {
      text-align: center;
      vertical-align: middle;
      padding: 10px;
      border-bottom: 1px solid #eee;
      font-size: 14px;
      overflow-wrap: break-word;
      word-break: break-word;
    }

    th {
      background: #fafafa;
      font-weight: 700;
    }

    .col-tariff { width: 24%; }
    .col-actual { width: 22%; }
    .col-format { width: 18%; }
    .col-qty { width: 10%; }
    .col-price { width: 12%; }
    .col-sum { width: 14%; }

    .money {
      white-space: nowrap;
      font-size: 20px;
      font-weight: 400;
      text-align: center;
      vertical-align: middle;
    }

    .money-input {
      font-size: 14px !important;
      font-weight: 400;
      color: #111;
      text-align: center;
    }

    .small {
      font-size: 12px;
      color: #666;
      line-height: 1.35;
    }

    .row-input {
      width: 84px;
      min-width: 84px;
      max-width: 84px;
      padding: 10px 10px;
      border-radius: 12px;
      border: 1px solid #ccc;
      font-size: 14px;
      background: #fff;
      text-align: center;
    }

    .row-select {
      width: 100%;
      min-width: 160px;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid #ccc;
      font-size: 14px;
      background: #fff;
      text-align: center;
    }

    .note-box {
      margin-top: 14px;
      padding: 12px 14px;
      border: 1px solid #eee;
      border-radius: 12px;
      background: #fafafa;
      font-size: 13px;
      line-height: 1.5;
      color: #444;
    }

    .after-cards-actions {
      display: flex;
      justify-content: flex-start;
      margin: 8px 0 18px;
    }

    .overall-total {
      margin-top: 8px;
      font-size: 40px;
      font-weight: 800;
      line-height: 1.1;
    }

    @media (max-width: 1100px) {
      .service-type-buttons {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    @media (max-width: 900px) {
      .grid, .grid-3, .grid-4 {
        grid-template-columns: 1fr;
      }

      .service-header {
        flex-direction: column;
      }

      .service-type-buttons {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .service-type-btn {
        border-radius: 12px 12px 0 0;
      }

      .overall-total {
        font-size: 32px;
      }
    }
  </style>
</head>

    async function calculateOrder() {
      const blocks = [...document.querySelectorAll(".service-card")];
      if (!blocks.length) {
        setStatus("Добавь хотя бы одну услугу.", true);
        return;
      }

      calculatedRows = [];
      setStatus("Идёт анализ...");

      for (const block of blocks) {
        const resultBox = block.querySelector(".service-result");
        resultBox.style.display = "none";
        resultBox.innerHTML = "";
      }

      try {
        for (const block of blocks) {
          const id = Number(block.dataset.blockId);
          const type = block.dataset.serviceType;
          const customName = document.getElementById(`service-name-${id}`)?.value?.trim() || getDefaultServiceName(type, id);
          const notes = [];
          let rows = [];

          if (type === "documents") {
            rows = await calculateDocumentsBlock(id, customName, notes);
          } else if (type === "drawings") {
            rows = await calculateDrawingsBlock(id, customName, notes);
          } else if (type === "copy") {
            rows = calculateCopyBlock(id, customName);
          } else if (type === "scan") {
            rows = calculateScanBlock(id, customName);
          } else if (type === "photos") {
            rows = calculatePhotosBlock(id, customName);
          } else if (type === "stickers") {
            rows = calculateStickersBlock(id, customName);
          }

          rows.push(...calculateExtrasRows(id, customName));
          calculatedRows.push(...rows);
          renderServiceResult(block, rows, notes);
        }

        recalcOverallTotal();
        setStatus("Готово.");
      } catch (error) {
        console.error(error);
        setStatus(error.message || "Ошибка расчёта.", true);
      }
    }

    async function calculateDocumentsBlock(id, customName, notes) {
      const file = document.getElementById(`docs-file-${id}`).files[0];
      const printMode = document.getElementById(`docs-print-mode-${id}`).value;
      const copies = Math.max(1, parseInt(document.getElementById(`docs-copies-${id}`).value || "1", 10));

      if (!file) {
        throw new Error(`В услуге "${customName}" не выбран PDF-файл.`);
      }

      const rows = [];
      const buffer = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: buffer }).promise;
      const groups = {};

      for (let i = 1; i <= pdf.numPages; i++) {
        setStatus(`Идёт анализ... ${file.name}: страница ${i} из ${pdf.numPages}`);
        const page = await pdf.getPage(i);
        const viewport = page.getViewport({ scale: 1 });

        const widthMm = ptToMm(viewport.width);
        const heightMm = ptToMm(viewport.height);
        const exactFormat = detectFormat(widthMm, heightMm);
        const nearestFormat = exactFormat === "CUSTOM" ? findNearestFormat(widthMm, heightMm) : exactFormat;

        let colorMode = "bw";
        if (printMode === "bw") colorMode = "bw";
        else if (printMode === "color") colorMode = "color";
        else colorMode = await detectPageColorMode(page);

        const actualLabel = buildActualFormatLabel(widthMm, heightMm, exactFormat);
        const key = [actualLabel, colorMode, nearestFormat].join("||");

        if (!groups[key]) {
          groups[key] = {
            serviceCardId: id,
            serviceName: customName,
            actualFormatLabel: actualLabel,
            billedFormat: nearestFormat,
            colorMode,
            qty: 0
          };
        }

        groups[key].qty += copies;
      }

      Object.values(groups).forEach(group => {
        const priceInfo = getDocumentPriceInfo(group.billedFormat, group.colorMode, group.qty);
        rows.push({
          id: makeRowId(),
          serviceCardId: id,
          serviceType: "documents",
          serviceName: customName,
          actualFormatLabel: group.actualFormatLabel,
          billedFormat: group.billedFormat,
          qty: group.qty,
          unitPrice: priceInfo.price,
          tariffCode: priceInfo.code,
          tariffLabel: priceInfo.label,
          unitPriceEditable: true,
          qtyEditable: true,
          billedFormatEditable: true,
          editableFormats: [...FORMAT_OPTIONS],
          colorMode: group.colorMode
        });

        if (group.actualFormatLabel.startsWith("≈")) {
          notes.push(`Нестандартный размер: ${group.actualFormatLabel}. Для расчёта округлено до ${FORMAT_LABELS[group.billedFormat] || group.billedFormat}.`);
        }
      });

      return rows;
    }

    async function calculateDrawingsBlock(id, customName, notes) {
      const color = document.getElementById(`drawing-color-${id}`).value;
      const qtyManual = Math.max(1, parseInt(document.getElementById(`drawing-qty-${id}`).value || "1", 10));
      const fold = document.getElementById(`drawing-fold-${id}`).value;
      const file = document.getElementById(`drawing-file-${id}`).files[0];

      const rows = [];

      if (file) {
        const buffer = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({ data: buffer }).promise;
        const groups = {};

        for (let i = 1; i <= pdf.numPages; i++) {
          setStatus(`Идёт анализ... ${file.name}: страница ${i} из ${pdf.numPages}`);
          const page = await pdf.getPage(i);
          const viewport = page.getViewport({ scale: 1 });

          const widthMm = ptToMm(viewport.width);
          const heightMm = ptToMm(viewport.height);
          const exactFormat = detectFormat(widthMm, heightMm);
          const nearestFormat = findNearestDrawingFormat(widthMm, heightMm);
          const actualLabel = buildActualFormatLabel(widthMm, heightMm, exactFormat);
          const key = [actualLabel, nearestFormat].join("||");

          if (!groups[key]) {
            groups[key] = {
              serviceCardId: id,
              serviceName: customName,
              actualFormatLabel: actualLabel,
              billedFormat: nearestFormat,
              qty: 0
            };
          }

          groups[key].qty += 1;
        }

        Object.values(groups).forEach(group => {
          const tariff = PRICES.drawings[color][group.billedFormat];
          if (tariff) {
            rows.push(fixedRow({
              serviceCardId: id,
              serviceName: customName,
              actualFormatLabel: group.actualFormatLabel,
              billedFormat: group.billedFormat,
              tariff,
              qty: group.qty
            }));
          } else {
            notes.push(`Для чертежа с размером ${group.actualFormatLabel} не найден подходящий тариф.`);
          }
        });
      } else {
        const format = document.getElementById(`drawing-format-${id}`).value;
        const tariff = PRICES.drawings[color][format];
        rows.push(fixedRow({
          serviceCardId: id,
          serviceName: customName,
          actualFormatLabel: FORMAT_LABELS[format],
          billedFormat: format,
          tariff,
          qty: qtyManual
        }));
      }

      if (fold !== "none") {
        const foldTariff = PRICES.drawings.fold[fold];
        rows.push(fixedRow({
          serviceCardId: id,
          serviceName: customName,
          actualFormatLabel: "Постобработка",
          billedFormat: "—",
          tariff: foldTariff,
          qty: rows.filter(r => r.tariffCode !== foldTariff.code).reduce((sum, r) => sum + r.qty, 0)
        }));
      }

      return rows;
    }

    function calculateCopyBlock(id, customName) {
      const format = document.getElementById(`copy-format-${id}`).value;
      const color = document.getElementById(`copy-color-${id}`).value;
      const source = document.getElementById(`copy-source-${id}`).value;
      const qty = Math.max(1, parseInt(document.getElementById(`copy-qty-${id}`).value || "1", 10));
      const tariff = PRICES.copy[format][color][source];

      return [fixedRow({
        serviceCardId: id,
        serviceName: customName,
        actualFormatLabel: FORMAT_LABELS[format],
        billedFormat: format,
        tariff,
        qty
      })];
    }

    function calculateScanBlock(id, customName) {
      const format = document.getElementById(`scan-format-${id}`).value;
      const source = document.getElementById(`scan-source-${id}`).value;
      const qty = Math.max(1, parseInt(document.getElementById(`scan-qty-${id}`).value || "1", 10));

      let tariff = null;
      if (format === "A4") {
        tariff = qty <= 50
          ? (source === "glass" ? PRICES.scan.A4.glass_lt50 : PRICES.scan.A4.feeder_lt50)
          : (source === "glass" ? PRICES.scan.A4.glass_gte50 : PRICES.scan.A4.feeder_gte50);
      } else if (format === "A3") {
        tariff = qty <= 50
          ? (source === "glass" ? PRICES.scan.A3.glass_lt50 : PRICES.scan.A3.feeder_lt50)
          : (source === "glass" ? PRICES.scan.A3.glass_gte50 : PRICES.scan.A3.feeder_gte50);
      } else {
        tariff = PRICES.scan[format].wide;
      }

      return [fixedRow({
        serviceCardId: id,
        serviceName: customName,
        actualFormatLabel: FORMAT_LABELS[format],
        billedFormat: format,
        tariff,
        qty
      })];
    }

    function calculatePhotosBlock(id, customName) {
      const format = document.getElementById(`photo-format-${id}`).value;
      const qty = Math.max(1, parseInt(document.getElementById(`photo-qty-${id}`).value || "1", 10));

      if (format === "10x15") {
        const tariff = getTierRow(PRICES.photos["10x15"], qty);
        return [fixedRow({
          serviceCardId: id,
          serviceName: customName,
          actualFormatLabel: "10×15 см",
          billedFormat: "10×15",
          tariff,
          qty
        })];

      const tariff = PRICES.photos[format];
      return [fixedRow({
        serviceCardId: id,
        serviceName: customName,
        actualFormatLabel: tariff.label,
        billedFormat: tariff.label,
        tariff,
        qty
      })];
    }

    function calculateStickersBlock(id, customName) {
      const type = document.getElementById(`sticker-type-${id}`).value;
      const qty = Math.max(1, parseInt(document.getElementById(`sticker-qty-${id}`).value || "1", 10));
      const tariff = PRICES.stickers[type];

      return [fixedRow({
        serviceCardId: id,
        serviceName: customName,
        actualFormatLabel: tariff.label.includes("SRA3") ? "SRA3 (320×450 мм)" : tariff.label,
        billedFormat: tariff.label.includes("SRA3") ? "SRA3" : "—",
        tariff,
        qty
      })];
    }

    function calculateExtrasRows(id, customName) {
      const rows = [];

      const laminationFormat = document.getElementById(`extra-lamination-format-${id}`).value;
      const laminationQty = Math.max(0, parseInt(document.getElementById(`extra-lamination-qty-${id}`).value || "0", 10));
      const bindingType = document.getElementById(`extra-binding-type-${id}`).value;
      const multiforaFormat = document.getElementById(`extra-multifora-format-${id}`).value;
      const multiforaQty = Math.max(0, parseInt(document.getElementById(`extra-multifora-qty-${id}`).value || "0", 10));
      const folderType = document.getElementById(`extra-folder-type-${id}`).value;

      if (laminationFormat !== "none" && laminationQty > 0) {
        const tariff = PRICES.lamination[laminationFormat];
        rows.push(fixedRow({
          serviceCardId: id,
          serviceName: customName,
          actualFormatLabel: FORMAT_LABELS[laminationFormat],
          billedFormat: laminationFormat,
          tariff,
          qty: laminationQty
        }));
      }

      if (bindingType !== "none") {
        const tariff = PRICES.binding[bindingType];
        rows.push(fixedRow({
          serviceCardId: id,
          serviceName: customName,
          actualFormatLabel: bindingType === "hardcover" ? "A4 (210×297 мм)" : "Постобработка",
          billedFormat: bindingType === "hardcover" ? "A4" : "—",
          tariff,
          qty: 1
        }));
      }

      if (multiforaFormat !== "none" && multiforaQty > 0) {
        const tariff = PRICES.multifora[multiforaFormat];
        rows.push(fixedRow({
          serviceCardId: id,
          serviceName: customName,
          actualFormatLabel: FORMAT_LABELS[multiforaFormat],
          billedFormat: multiforaFormat,
          tariff,
          qty: multiforaQty
        }));
      }

      if (folderType !== "none") {
        const tariff = PRICES.folders[folderType];
        rows.push(fixedRow({
          serviceCardId: id,
          serviceName: customName,
          actualFormatLabel: "—",
          billedFormat: "—",
          tariff,
          qty: 1
        }));
      }

      return rows;
    }

    function fixedRow({ serviceCardId, serviceName, actualFormatLabel, billedFormat, tariff, qty }) {
      return {
        id: makeRowId(),
        serviceCardId,
        serviceType: "fixed",
        serviceName,
        actualFormatLabel,
        billedFormat,
        qty,
        unitPrice: tariff.price,
        tariffCode: tariff.code,
        tariffLabel: tariff.label,
        unitPriceEditable: true,
        qtyEditable: true,
        billedFormatEditable: false,
        editableFormats: [],
        colorMode: null
      };
    }

              <tr>
                <th class="col-tariff">Пункт прайса</th>
                <th class="col-actual">Фактический размер</th>
                <th class="col-format">Формат для расчёта</th>
                <th class="col-qty">Кол-во</th>
                <th class="col-price">Цена за ед.</th>
                <th class="col-sum">Сумма</th>
              </tr>
            </thead>
            <tbody>
              ${rows.map(row => renderRowHtml(row)).join("")}
            </tbody>
          </table>
        </div>
        ${notes.length ? `<div class="note-box">${notes.map(n => `• ${escapeHtml(n)}`).join("<br>")}</div>` : ""}
      `;

      bindEditorsInCard(card);
    }

    function renderRowHtml(row) {
      const billedFormatCell = row.billedFormatEditable
        ? formatSelectHtml(row)
        : escapeHtml(row.billedFormat || "—");

      const qtyCell = row.qtyEditable
        ? `<input type="number" min="1" step="1" class="row-input row-qty-input" data-row-id="${row.id}" value="${String(row.qty)}">`
        : escapeHtml(String(row.qty));

      const unitPriceCell = row.unitPriceEditable
        ? `<input type="number" min="0" step="0.01" class="row-input money-input row-price-input" data-row-id="${row.id}" value="${formatInputNumber(row.unitPrice)}">`
        : money(row.unitPrice);

      return `
        <tr data-row-id="${row.id}">
          <td>
            <div>${escapeHtml(row.tariffCode || "—")}</div>
            <div class="small">${escapeHtml(row.tariffLabel || "—")}</div>
          </td>
          <td>${escapeHtml(row.actualFormatLabel || "—")}</td>
          <td>${billedFormatCell}</td>
          <td>${qtyCell}</td>
          <td>${unitPriceCell}</td>
          <td class="money row-sum-cell">${money(row.qty * row.unitPrice)}</td>
        </tr>
      `;
    }

    function bindEditorsInCard(card) {
      card.querySelectorAll(".row-price-input").forEach(input => {
        input.addEventListener("input", (e) => {
          const row = calculatedRows.find(r => r.id === e.target.dataset.rowId);
          if (!row) return;

          row.unitPrice = Math.max(0, parseFlexibleNumber(e.target.value));

          calculatedRows
            .filter(r => r.tariffCode === row.tariffCode)
            .forEach(r => {
              r.unitPrice = row.unitPrice;
              updateRowDom(r.id, { updatePriceInput: r.id !== row.id });
            });

          recalcOverallTotal();
        });
      });

      card.querySelectorAll(".row-qty-input").forEach(input => {
        input.addEventListener("input", (e) => {
          const row = calculatedRows.find(r => r.id === e.target.dataset.rowId);
          if (!row) return;

          row.qty = Math.max(1, parsePositiveInt(e.target.value));
          if (row.serviceType === "documents") {
            recalculateDocumentRowByQty(row);
          }

          updateRowDom(row.id, { updateQtyInput: false, updatePriceInput: true });
          recalcOverallTotal();
        });
      });

      card.querySelectorAll(".row-format-select").forEach(select => {
        select.addEventListener("change", (e) => {
          const row = calculatedRows.find(r => r.id === e.target.dataset.rowId);
          if (!row) return;

          row.billedFormat = e.target.value;
          const newInfo = getDocumentPriceInfo(row.billedFormat, row.colorMode, row.qty);
          row.tariffCode = newInfo.code;
          row.tariffLabel = newInfo.label;
          row.unitPrice = newInfo.price;
          updateRowDom(row.id, { updatePriceInput: true });
          recalcOverallTotal();
        });
      });
    }

    function updateRowDom(rowId, options = {}) {
      const row = calculatedRows.find(r => r.id === rowId);
      const tr = document.querySelector(`tr[data-row-id="${rowId}"]`);
      if (!row || !tr) return;

      const cells = tr.children;

      cells[0].innerHTML = `
        <div>${escapeHtml(row.tariffCode || "—")}</div>
        <div class="small">${escapeHtml(row.tariffLabel || "—")}</div>
      `;

      if (row.billedFormatEditable) {
        const select = tr.querySelector(".row-format-select");
        if (select && select.value !== row.billedFormat) {
          select.value = row.billedFormat;
        }
      }

      const qtyInput = tr.querySelector(".row-qty-input");
      if (qtyInput && options.updateQtyInput !== false) {
        qtyInput.value = row.qty;
      }

      const priceInput = tr.querySelector(".row-price-input");
      if (priceInput && options.updatePriceInput !== false) {
        priceInput.value = formatInputNumber(row.unitPrice);
      }

      const sumCell = tr.querySelector(".row-sum-cell");
      if (sumCell) {
        sumCell.textContent = money(row.qty * row.unitPrice);
      }
    }

    function recalculateDocumentRowByQty(row) {
      const newInfo = getDocumentPriceInfo(row.billedFormat, row.colorMode, row.qty);
      row.tariffCode = newInfo.code;
      row.tariffLabel = newInfo.label;

      if (row.colorMode === "bw") {
        row.unitPrice = newInfo.price;
      } else if (!isFiniteNumber(row.unitPrice) || row.unitPrice <= 0) {
        row.unitPrice = newInfo.price;
      }
    }

    function recalcOverallTotal() {
      const total = calculatedRows.reduce((sum, row) => sum + row.qty * row.unitPrice, 0);
      overallTotalBox.style.display = calculatedRows.length ? "block" : "none";
      overallTotalBox.textContent = calculatedRows.length ? `Итого: ${money(total)}` : "";
    }

    function formatSelectHtml(row) {
      const options = row.editableFormats.map(fmt => {
        const selected = fmt === row.billedFormat ? " selected" : "";
        return `<option value="${fmt}"${selected}>${escapeHtml(FORMAT_LABELS[fmt] || fmt)}</option>`;
      }).join("");

      return `
        <select class="row-select row-format-select" data-row-id="${row.id}">
          ${options}
        </select>
      `;
    }

    function getDocumentPriceInfo(format, colorMode, qty) {
      if (colorMode === "bw") {
        if (!PRICES.documentsBW[format]) {
          return { price: 0, code: "—", label: `Для ${format} нет автоматической цены ч/б` };
        }
        const tier = getTierRow(PRICES.documentsBW[format], qty);
        return {
          price: tier.price,
          code: tier.code,
          label: tier.label
        };
      }

      if (!PRICES.documentsColor[format]) {
        return { price: 0, code: "—", label: `Для ${format} нет автоматической цветной цены` };
      }

      const info = PRICES.documentsColor[format];
      return {
        price: info.max,
        code: info.code,
        label: `${info.label} (${money(info.min)} – ${money(info.max)})`
      };
    }

    function getTierRow(tiers, qty) {
      for (const tier of tiers) {
        if (qty <= tier.max) return tier;
      }
      return tiers[tiers.length - 1];
    }

    function makeRowId() {
      return "row_" + Math.random().toString(36).slice(2, 11);
    }

    function clearAll() {
      servicesContainer.innerHTML = "";
      blockCounter = 1;
      calculatedRows = [];
      overallTotalBox.style.display = "none";
      overallTotalBox.textContent = "";
      addServiceBlock("documents");
      setStatus("");
    }

    function setStatus(text, isError = false) {
      statusBox.textContent = text || "";
      statusBox.style.color = isError ? "#b00020" : "#444";
    }

    function money(value) {
      return `${Number(value).toFixed(2).replace(".", ",")} ₽`;
    }

    function formatInputNumber(value) {
      if (!isFiniteNumber(value)) return "0.00";
      return Number(value).toFixed(2);
    }

    function parseFlexibleNumber(value) {
      const num = parseFloat(String(value).replace(",", "."));
      return Number.isFinite(num) ? num : 0;
    }

    function parsePositiveInt(value) {
      const num = parseInt(String(value), 10);
      return Number.isFinite(num) && num > 0 ? num : 1;
    }

    function isFiniteNumber(value) {
      return typeof value === "number" && Number.isFinite(value);
    }

    function ptToMm(pt) {
      return pt * 25.4 / 72;
    }

    function round1(num) {
      return Math.round(num * 10) / 10;
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function detectFormat(widthMm, heightMm) {
      for (const [name, size] of Object.entries(FORMATS)) {
        const normalMatch =
          Math.abs(widthMm - size.w) <= TOLERANCE_MM &&
          Math.abs(heightMm - size.h) <= TOLERANCE_MM;

        const rotatedMatch =
          Math.abs(widthMm - size.h) <= TOLERANCE_MM &&
          Math.abs(heightMm - size.w) <= TOLERANCE_MM;

        if (normalMatch || rotatedMatch) return name;
      }
      return "CUSTOM";
    }

    function distanceToFormat(widthMm, heightMm, size) {
      const d1 = Math.abs(widthMm - size.w) + Math.abs(heightMm - size.h);
      const d2 = Math.abs(widthMm - size.h) + Math.abs(heightMm - size.w);
      return Math.min(d1, d2);
    }

    function findNearestFormat(widthMm, heightMm) {
      let best = "A4";
      let bestDistance = Infinity;

      Object.entries(FORMATS).forEach(([name, size]) => {
        const dist = distanceToFormat(widthMm, heightMm, size);
        if (dist < bestDistance) {
          bestDistance = dist;
          best = name;
        }
      });

      return best;
    }

    function findNearestDrawingFormat(widthMm, heightMm) {
      const drawingFormats = ["A2", "A1", "A0"];
      let best = "A2";
      let bestDistance = Infinity;

      drawingFormats.forEach(name => {
        const size = FORMATS[name];
        const dist = distanceToFormat(widthMm, heightMm, size);
        if (dist < bestDistance) {
          bestDistance = dist;
          best = name;
        }
      });

      return best;
    }

    function buildActualFormatLabel(widthMm, heightMm, exactFormat) {
      const w = round1(widthMm);
      const h = round1(heightMm);

      if (exactFormat !== "CUSTOM") {
        return `${exactFormat} (${FORMATS[exactFormat].w}×${FORMATS[exactFormat].h} мм)`;
      }

      const nearest = findNearestFormat(widthMm, heightMm);
      return `≈ ${nearest} (${FORMATS[nearest].w}×${FORMATS[nearest].h} мм), файл: ${w}×${h} мм`;
    }

    async function detectPageColorMode(page) {
      const viewport = page.getViewport({ scale: 0.5 });
      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d", { willReadFrequently: true });

      canvas.width = Math.max(1, Math.floor(viewport.width));
      canvas.height = Math.max(1, Math.floor(viewport.height));

      await page.render({ canvasContext: ctx, viewport }).promise;
      const { data, width, height } = ctx.getImageData(0, 0, canvas.width, canvas.height);

      let coloredPixels = 0;

      for (let y = 0; y < height; y += SAMPLE_STEP) {
        for (let x = 0; x < width; x += SAMPLE_STEP) {
          const idx = (y * width + x) * 4;
          const r = data[idx];
          const g = data[idx + 1];
          const b = data[idx + 2];
          const a = data[idx + 3];

          if (a < 10) continue;

          if (
            Math.abs(r - g) > COLOR_TOLERANCE ||
            Math.abs(g - b) > COLOR_TOLERANCE ||
            Math.abs(r - b) > COLOR_TOLERANCE
          ) {
            coloredPixels++;
            if (coloredPixels >= 5) return "color";
          }
        }
      }

      return "bw";
    }
  </script>
</body>
