<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Калькулятор печати</title>

  <style>
    * { box-sizing: border-box; }

    :root {
      --bg: #f6f6f7;
      --card: #ffffff;
      --line: #dddddd;
      --line-soft: #eeeeee;
      --text: #111111;
      --muted: #666666;
      --black: #111111;
      --white: #ffffff;
      --danger: #b00020;

      --col-tariff: 20%;
      --col-actual: 18%;
      --col-custom: 12%;
      --col-format: 18%;
      --col-qty: 10%;
      --col-price: 12%;
      --col-sum: 10%;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap {
      max-width: 1360px;
      margin: 0 auto;
      padding: 18px 24px 24px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 32px;
    }

    .top-bar {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .top-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin: 0;
    }

    .status-inline {
      font-size: 14px;
      color: #444;
      min-height: 20px;
      display: flex;
      align-items: center;
    }

    button {
      cursor: pointer;
      border: none;
      border-radius: 12px;
      padding: 12px 18px;
      font-weight: 700;
      font-size: 14px;
    }

    .btn-primary {
      background: var(--black);
      color: var(--white);
    }

    .btn-secondary {
      background: var(--white);
      color: var(--black);
      border: 1px solid #ccc;
    }

    .btn-danger {
      background: var(--white);
      color: var(--danger);
      border: 1px solid #e0b4b4;
    }

    .btn-mini {
      padding: 8px 10px;
      font-size: 12px;
      border-radius: 10px;
      font-weight: 700;
    }

    .icon-btn {
      width: 40px;
      min-width: 40px;
      height: 40px;
      padding: 0;
      border-radius: 10px;
      border: 1px solid #ccc;
      background: #fff;
      font-size: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .icon-btn.locked {
      background: #111;
      color: #fff;
      border-color: #111;
    }

    .icon-btn.remove-extra {
      color: var(--danger);
      border-color: #e0b4b4;
    }

    .service-card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
      margin-bottom: 14px;
    }

    .service-header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .service-header-main {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
    }

    .service-title {
      font-size: 20px;
      font-weight: 700;
      margin: 0 0 10px;
    }

    .service-name-input {
      width: 100%;
      max-width: 420px;
      margin: 0;
      padding: 10px 12px;
      border: 1px solid #ccc;
      border-radius: 12px;
      font-size: 14px;
      background: #fff;
      height: 44px;
    }

    .service-type-buttons {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      width: 100%;
      gap: 8px;
      margin-bottom: 14px;
    }

    .service-type-btn {
      width: 100%;
      padding: 12px 8px;
      border-radius: 12px;
      border: 1px solid #ccc;
      background: #fff;
      color: #111;
      font-weight: 700;
      cursor: pointer;
      text-align: center;
    }

    .service-type-btn.active {
      background: #111;
      border-color: #111;
      color: #fff;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .field label {
      font-size: 14px;
      font-weight: 700;
    }

    input[type="text"],
    input[type="file"],
    select,
    input[type="number"] {
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 12px;
      font-size: 14px;
      background: #fff;
      height: 44px;
    }

    input[type="number"] {
      text-align: center;
      appearance: textfield;
      -moz-appearance: textfield;
    }

    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    input[type="file"] {
      height: auto;
      padding: 10px;
    }

    .service-actions {
      display: flex;
      justify-content: flex-start;
      margin-top: 14px;
    }

    .service-result {
      margin-top: 20px;
      padding-top: 18px;
      border-top: 1px solid var(--line-soft);
    }

    .result-toggle {
      width: 100%;
      background: transparent;
      border: none;
      border-radius: 0;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: #111;
      text-align: left;
      margin-bottom: 12px;
    }

    .service-result-title {
      font-size: 18px;
      font-weight: 700;
      margin: 0;
    }

    .result-chevron {
      font-size: 18px;
      line-height: 1;
    }

    .result-content {
      display: block;
    }

    .result-content.collapsed {
      display: none;
    }

    .result-actions {
      display: flex;
      justify-content: flex-start;
      gap: 10px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .table-wrap {
      width: 100%;
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      table-layout: fixed;
    }

    col.col-tariff { width: var(--col-tariff); }
    col.col-actual { width: var(--col-actual); }
    col.col-custom { width: var(--col-custom); }
    col.col-format { width: var(--col-format); }
    col.col-qty { width: var(--col-qty); }
    col.col-price { width: var(--col-price); }
    col.col-sum { width: var(--col-sum); }

    th, td {
      vertical-align: middle;
      padding: 10px;
      border-bottom: 1px solid #eee;
      font-size: 14px;
      word-break: break-word;
      overflow-wrap: anywhere;
    }

    th {
      background: #fafafa;
      font-weight: 700;
      white-space: nowrap;
      text-align: center;
    }

    td { text-align: center; }

    .text-left {
      text-align: left !important;
    }

    .format-cell {
      text-align: left !important;
    }

    .sum-cell {
      text-align: right !important;
      white-space: nowrap;
      font-size: 18px;
      font-weight: 700;
    }

    .small {
      font-size: 12px;
      color: #666;
      line-height: 1.35;
    }

    .row-qty-input {
      width: 100%;
      max-width: 110px;
      text-align: center;
      height: 40px;
      margin: 0 auto;
    }

    .row-select {
      width: 100%;
      min-width: 0;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid #ccc;
      font-size: 14px;
      background: #fff;
      text-align: left;
      height: 40px;
    }

    .price-edit-box {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 6px;
      flex-wrap: nowrap;
    }

    .row-price-input {
      width: 100%;
      max-width: 110px;
      min-width: 0;
      text-align: center;
      font-size: 14px;
      height: 40px;
    }

    .note-box {
      margin-top: 14px;
      padding: 12px 14px;
      border: 1px solid #eee;
      border-radius: 12px;
      background: #fafafa;
      font-size: 13px;
      line-height: 1.5;
      color: #444;
    }

    .add-extra-trigger-row {
      background: #fcfcfc;
    }

    .extra-inline-row td {
      background: #fafafa;
      padding: 14px;
    }

    .extra-inline-box {
      border: 1px solid #eee;
      border-radius: 12px;
      padding: 14px;
      background: #fff;
    }

    .extra-inline-toolbar {
      display: grid;
      grid-template-columns: 180px 1fr;
      gap: 14px;
      align-items: start;
    }

    .inline-extra-title {
      font-size: 14px;
      font-weight: 700;
      padding-top: 10px;
      text-align: left;
    }

    .extra-type-buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .extra-type-btn {
      background: #fff;
      color: #111;
      border: 1px solid #ccc;
      border-radius: 12px;
      padding: 10px 14px;
      font-weight: 700;
      font-size: 14px;
    }

    .extra-type-btn.active {
      background: #111;
      color: #fff;
      border-color: #111;
    }

    .download-btn {
      margin-top: 8px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
      background: #fff;
      color: #111;
      text-decoration: none;
      cursor: pointer;
    }

    .bottom-bar {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 16px;
      margin-top: 8px;
    }

    .after-cards-actions {
      display: flex;
      justify-content: flex-start;
      margin: 0;
    }

    .overall-total {
      margin-top: 0;
      font-size: 40px;
      font-weight: 800;
      line-height: 1.1;
      text-align: right;
      margin-left: auto;
    }

    @media (max-width: 1100px) {
      .extra-inline-toolbar {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 900px) {
      .grid, .grid-3 {
        grid-template-columns: 1fr;
      }

      .service-header {
        flex-direction: column;
      }

      .service-type-buttons {
        grid-template-columns: 1fr;
      }

      .overall-total {
        font-size: 32px;
      }

      .bottom-bar {
        flex-direction: column;
        align-items: stretch;
      }

      .overall-total {
        text-align: left;
      }

      table, thead, tbody, tr, th, td, colgroup, col {
        display: block;
        width: 100% !important;
      }

      thead {
        display: none;
      }

      tr {
        border-bottom: 1px solid #eee;
      }

      td {
        text-align: left !important;
        padding: 8px 10px;
      }

      .sum-cell {
        text-align: left !important;
      }

      .price-edit-box {
        justify-content: flex-start;
      }
    }
  </style>
</head>

      ensureTypeBuckets(id, type);

      const customName = document.getElementById(`service-name-${id}`)?.value?.trim() || getDefaultServiceName(type, id);
      const notes = [];
      let baseRows = [];

      setStatus("Идёт анализ...");

      if (type === "documents") {
        baseRows = await calculateDocumentsBlock(id, customName, notes);
      } else if (type === "drawings") {
        baseRows = await calculateDrawingsBlock(id, customName, notes);
      } else if (type === "separator") {
        baseRows = await calculateSeparatorBlock(id, customName, notes);
      }

      const state = serviceStates[id];
      const oldRows = state.resultsByType[type] || [];
      const extraRows = oldRows.filter(r => r.isExtraRow);

      state.resultsByType[type] = [...baseRows, ...extraRows];
      state.notesByType[type] = notes;

      rebuildCalculatedRows();
      renderServiceResult(block);

      recalcOverallTotal();
      if (setReadyText) setStatus("Готово.");

    async function analyzePdfAndGroup(file, printMode, copies, preferDrawingForWide = false, splitByCategory = false) {
      const rawBytes = await file.arrayBuffer();
      const bytes = new Uint8Array(rawBytes);

      const pdf = await pdfjsLib.getDocument({ data: bytes.slice() }).promise;
      const groupsMap = new Map();
      const allCustomPages = [];
      const notes = [];

      for (let i = 1; i <= pdf.numPages; i++) {
        setStatus(`Идёт анализ... ${file.name}: страница ${i} из ${pdf.numPages}`);
        const page = await pdf.getPage(i);
        const viewport = page.getViewport({ scale: 1 });

        const widthMm = ptToMm(viewport.width);
        const heightMm = ptToMm(viewport.height);
        const exactStandard = detectFormat(widthMm, heightMm);

        let colorMode = "bw";
        if (printMode === "bw" || printMode === "color") colorMode = printMode;
        else colorMode = await detectPageColorMode(page);

        const billed = getBestBillingFormat(widthMm, heightMm, colorMode, preferDrawingForWide);
        const actualLabel = buildActualFormatLabel(widthMm, heightMm, exactStandard, billed.formatKey);
        const priceInfo = getPriceInfoByFormat(billed.formatKey, colorMode, copies);

        if (billed.isCustomLike) allCustomPages.push(i);
        if (priceInfo.note) notes.push(`Стр. ${i}: ${priceInfo.note}`);

        const groupKey = splitByCategory
          ? `${colorMode}||${billed.formatKey}`
          : `${actualLabel}||${colorMode}||${billed.formatKey}`;

        if (!groupsMap.has(groupKey)) {
          groupsMap.set(groupKey, {
            actualFormatLabel: splitByCategory
              ? `${colorMode === "color" ? "Цвет" : "Ч/б"} / ${getFormatDisplayLabel(billed.formatKey)}`
              : actualLabel,
            pageNumbers: [],
            customPageNumbers: [],
            billedFormat: billed.formatKey,
            colorMode,
            qty: 0,
            priceInfo
          });
        }

        const group = groupsMap.get(groupKey);
        group.pageNumbers.push(i);
        group.qty += copies;
        if (billed.isCustomLike) group.customPageNumbers.push(i);
      }

      const groups = [...groupsMap.values()].map(group => ({
        ...group,
        pageNumbers: [...group.pageNumbers].sort((a, b) => a - b),
        customPageNumbers: [...group.customPageNumbers].sort((a, b) => a - b)
      }));

      return { groups, allCustomPages, notes: uniqueStrings(notes), bytes };
    }

    function getBestBillingFormat(widthMm, heightMm, colorMode, preferDrawingForWide = false) {
      const exact = detectFormat(widthMm, heightMm);

      if (exact !== "CUSTOM") {
        return {
          formatKey: exact,
          isCustomLike: false
        };
      }

      const wide = detectExtendedWideFormat(widthMm, heightMm);
      if (wide) {
        return {
          formatKey: wide.formatKey,
          isCustomLike: true
        };
      }

      const nearestStd = findNearestFormat(widthMm, heightMm);
      if (preferDrawingForWide && ["A4", "A3"].includes(nearestStd)) {
        return { formatKey: "A2", isCustomLike: true };
      }

      return {
        formatKey: nearestStd,
        isCustomLike: true
      };
    }

    function detectExtendedWideFormat(widthMm, heightMm) {
      const shortSide = Math.min(widthMm, heightMm);
      const longSide = Math.max(widthMm, heightMm);

      let best = null;

      ["A4", "A3", "A2"].forEach(base => {
        const baseShort = FORMATS[base].h;
        const baseStep = FORMATS[base].w;

        const shortDiff = Math.abs(shortSide - baseShort);
        if (shortDiff > TOLERANCE_MM + 3) return;

        const rawMultiplier = longSide / baseStep;
        const multiplier = Math.max(3, Math.ceil(rawMultiplier - 0.0001));
        const targetLong = baseStep * multiplier;
        const diff = Math.abs(longSide - targetLong) + shortDiff;

        if (!best || diff < best.diff) {
          best = {
            diff,
            formatKey: `${base}x${multiplier}`
          };
        }
      });

      return best;
    }

    function getPriceInfoByFormat(formatKey, colorMode, qty) {
      if (PRICES.documentsBW[formatKey] || PRICES.documentsColor[formatKey]) {
        return getDocumentPriceInfo(formatKey, colorMode, qty);
      }

      if (PRICES.drawingsExact[colorMode]?.[formatKey]) {
        const tariff = PRICES.drawingsExact[colorMode][formatKey];
        return {
          price: tariff.price,
          code: tariff.code,
          label: tariff.label,
          syncKey: `${colorMode}:${tariff.code}`,
          note: ""
        };
      }

      if (isWideFormatKey(formatKey)) {
        return getWidePriceInfo(formatKey, colorMode);
      }

      return {
        price: 0,
        code: "—",
        label: `Для ${formatKey} нет тарифа`,
        syncKey: `MANUAL:${formatKey}:${colorMode}`,
        note: `Не найден тариф для формата ${formatKey}.`
      };
    }

    function getDocumentPriceInfo(format, colorMode, qty) {
      if (colorMode === "bw") {
        if (!PRICES.documentsBW[format]) {
          const wideFallback = isWideFormatKey(format) ? getWidePriceInfo(format, colorMode) : null;
          if (wideFallback) return wideFallback;

          if (PRICES.drawingsExact.bw[format]) {
            const tariff = PRICES.drawingsExact.bw[format];
            return {
              price: tariff.price,
              code: tariff.code,
              label: tariff.label,
              syncKey: `bw:${tariff.code}`,
              note: ""
            };
          }

          return { price: 0, code: "—", label: `Для ${format} нет автоматической цены`, syncKey: `MANUAL:${format}:bw`, note: "" };
        }

        const tier = getTierRow(PRICES.documentsBW[format], qty);
        return {
          price: tier.price,
          code: tier.code,
          label: tier.label,
          syncKey: `bw:${tier.code}`,
          note: ""
        };
      }

      if (!PRICES.documentsColor[format]) {
        const wideFallback = isWideFormatKey(format) ? getWidePriceInfo(format, colorMode) : null;
        if (wideFallback) return wideFallback;

        if (PRICES.drawingsExact.color[format]) {
          const tariff = PRICES.drawingsExact.color[format];
          return {
            price: tariff.price,
            code: tariff.code,
            label: tariff.label,
            syncKey: `color:${tariff.code}`,
            note: ""
          };
        }

        return { price: 0, code: "—", label: `Для ${format} нет автоматической цены`, syncKey: `MANUAL:${format}:color`, note: "" };
      }

      const info = PRICES.documentsColor[format];
      return {
        price: info.max,
        code: info.code,
        label: `${info.label} (${money(info.min)} – ${money(info.max)})`,
        syncKey: `color:${info.code}`,
        note: ""
      };
    }

    function getWidePriceInfo(formatKey, colorMode) {
      const parsed = parseWideFormatKey(formatKey);
      if (!parsed) {
        return {
          price: 0,
          code: "—",
          label: `Не удалось распознать формат ${formatKey}`,
          syncKey: `MANUAL:${formatKey}:${colorMode}`,
          note: ""
        };
      }

      const { base, multiplier } = parsed;
      const table = PRICES.drawingsWide[colorMode]?.[base];

      if (!table) {
        return {
          price: 0,
          code: "—",
          label: `Для ${formatKey} нет широкоформатного тарифа`,
          syncKey: `MANUAL:${formatKey}:${colorMode}`,
          note: ""
        };
      }

      if (table[multiplier]) {
        const tariff = table[multiplier];
        return {
          price: tariff.price,
          code: tariff.code,
          label: tariff.label,
          syncKey: `${colorMode}:${tariff.code}`,
          note: ""
        };
      }

      const knownMultipliers = Object.keys(table).map(Number).sort((a, b) => a - b);
      const maxKnown = knownMultipliers[knownMultipliers.length - 1];
      const prevKnown = knownMultipliers[knownMultipliers.length - 2] ?? maxKnown - 1;
      const lastPrice = table[maxKnown].price;
      const prevPrice = table[prevKnown].price;
      const step = lastPrice - prevPrice;

      const extrapolatedPrice = lastPrice + (multiplier - maxKnown) * step;
      const size = getWideFormatSize(base, multiplier);

      return {
        price: extrapolatedPrice,
        code: `${table[maxKnown].code}+`,
        label: `Широкоформатная струйная печать, ${colorMode === "color" ? "цветн" : "ч/б"}, формат ${base}х${multiplier} (${size.w}×${size.h} мм), цена продолжена по шагу прайса`,
        syncKey: `${colorMode}:EXT:${base}`,
        note: `Для ${base}х${multiplier} применено продолжение шага сверх прайса.`
      };
    }

    function getTierRow(tiers, qty) {
      for (const tier of tiers) {
        if (qty <= tier.max) return tier;
      }
      return tiers[tiers.length - 1];
    }

      const qtyCell = row.qtyEditable
        ? `<input type="number" min="1" step="1" class="row-qty-input row-qty-editor" data-row-id="${row.id}" value="${String(row.qty)}">`

    function bindResultArea(block) {
      const id = Number(block.dataset.blockId);
      const type = getCurrentTypeForBlock(block);
      ensureTypeBuckets(id, type);

      const state = serviceStates[id];
      const resultBox = block.querySelector(".service-result");
      const toggleBtn = resultBox.querySelector(".result-toggle");
      const inlineAddBtn = resultBox.querySelector(".inline-add-extra-btn");

      toggleBtn.addEventListener("click", () => {
        state.resultCollapsedByType[type] = !state.resultCollapsedByType[type];
        renderServiceResult(block);
      });

      resultBox.querySelectorAll(".extra-type-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          state.selectedExtraTypeByType[type] =
            state.selectedExtraTypeByType[type] === btn.dataset.extraType ? "" : btn.dataset.extraType;
          renderServiceResult(block);
        });
      });

      if (inlineAddBtn) {
        inlineAddBtn.addEventListener("click", () => {
          const extraRow = buildInlineExtraRow(id, type);
          if (!extraRow) return;

          const rows = state.resultsByType[type] || [];
          rows.push(extraRow);
          state.resultsByType[type] = rows;
          state.selectedExtraTypeByType[type] = "";

          rebuildCalculatedRows();
          renderServiceResult(block);
          recalcOverallTotal();
        });
      }

      bindRowEditors(block);
    }

    function buildInlineExtraRow(id, type) {
      const serviceName = document.getElementById(`service-name-${id}`)?.value?.trim() || getDefaultServiceName(type, id);
      const extraType = serviceStates[id].selectedExtraTypeByType[type];
      if (!extraType) return null;

      let tariff = null;
      let actualFormatLabel = "Постобработка";
      let billedFormat = "—";
      let qty = 1;

      if (extraType === "binding") {
        const bindingType = document.getElementById(`inline-binding-type-${id}-${type}`).value;
        qty = Math.max(1, parseInt(document.getElementById(`inline-binding-qty-${id}-${type}`).value || "1", 10));
        tariff = PRICES.binding[bindingType];
        if (bindingType === "hardcover") {
          actualFormatLabel = "A4 (210×297 мм)";
          billedFormat = "A4";
        }
      }

      if (extraType === "multifora") {
        const format = document.getElementById(`inline-multifora-format-${id}-${type}`).value;
        qty = Math.max(1, parseInt(document.getElementById(`inline-multifora-qty-${id}-${type}`).value || "1", 10));
        tariff = PRICES.multifora[format];
        actualFormatLabel = getFormatDisplayLabel(format);
        billedFormat = format;
      }

      if (extraType === "lamination") {
        const format = document.getElementById(`inline-lamination-format-${id}-${type}`).value;
        qty = Math.max(1, parseInt(document.getElementById(`inline-lamination-qty-${id}-${type}`).value || "1", 10));
        tariff = PRICES.lamination[format];
        actualFormatLabel = getFormatDisplayLabel(format);
        billedFormat = format;
      }

      if (extraType === "folder") {
        const folderType = document.getElementById(`inline-folder-type-${id}-${type}`).value;
        qty = Math.max(1, parseInt(document.getElementById(`inline-folder-qty-${id}-${type}`).value || "1", 10));
        tariff = PRICES.folders[folderType];
        actualFormatLabel = "—";
        billedFormat = "—";
      }

      if (!tariff) return null;

      return {
        id: makeRowId(),
        serviceCardId: id,
        serviceType: type,
        serviceName,
        actualFormatLabel,
        customPageNumbers: [],
        billedFormat,
        qty,
        unitPrice: tariff.price,
        tariffCode: tariff.code,
        tariffLabel: tariff.label,
        priceSyncKey: `EXTRA:${tariff.code}`,
        unitPriceEditable: true,
        qtyEditable: true,
        billedFormatEditable: false,
        editableFormats: [],
        colorMode: null,
        isExtraRow: true,
        isSeparatorRow: false,
        priceLocked: false,
        priceWasManuallyChanged: false
      };
    }

    function bindRowEditors(block) {
      block.querySelectorAll(".row-price-editor").forEach(input => {
        input.addEventListener("input", (e) => {
          const row = calculatedRows.find(r => r.id === e.target.dataset.rowId);
          if (!row) return;

          row.unitPrice = Math.max(0, parseFlexibleNumber(e.target.value));
          row.priceWasManuallyChanged = true;

          if (!row.priceLocked && row.priceSyncKey && !String(row.priceSyncKey).startsWith("MANUAL:")) {
            calculatedRows
              .filter(r => r.id !== row.id && r.priceSyncKey === row.priceSyncKey && !r.priceLocked)
              .forEach(r => {
                r.unitPrice = row.unitPrice;
                r.priceWasManuallyChanged = true;
                updateRowDom(r.id, { updatePriceInput: true });
              });
          }

          updateRowDom(row.id, { updatePriceInput: false });
          syncStatesFromCalculatedRows();
          recalcOverallTotal();
        });
      });

      block.querySelectorAll(".lock-price-btn").forEach(btn => {
        btn.addEventListener("click", (e) => {
          const row = calculatedRows.find(r => r.id === e.currentTarget.dataset.rowId);
          if (!row) return;
          row.priceLocked = !row.priceLocked;
          syncStatesFromCalculatedRows();
          renderServiceResult(block);
          recalcOverallTotal();
        });
      });

      block.querySelectorAll(".remove-extra-btn").forEach(btn => {
        btn.addEventListener("click", (e) => {
          const rowId = e.currentTarget.dataset.rowId;
          calculatedRows = calculatedRows.filter(r => r.id !== rowId);
          syncStatesFromCalculatedRows();
          renderServiceResult(block);
          recalcOverallTotal();
        });
      });

      block.querySelectorAll(".row-qty-editor").forEach(input => {
        input.addEventListener("input", (e) => {
          const row = calculatedRows.find(r => r.id === e.target.dataset.rowId);
          if (!row) return;

          row.qty = Math.max(1, parsePositiveInt(e.target.value));

          if (!row.priceWasManuallyChanged || !row.priceLocked) {
            const newInfo = getPriceInfoByFormat(row.billedFormat, row.colorMode || "bw", row.qty);
            row.tariffCode = newInfo.code;
            row.tariffLabel = newInfo.label;
            row.priceSyncKey = newInfo.syncKey;
            if (!row.priceWasManuallyChanged || !row.priceLocked) row.unitPrice = newInfo.price;
          }

          updateRowDom(row.id, { updateQtyInput: false, updatePriceInput: true });
          syncStatesFromCalculatedRows();
          recalcOverallTotal();
        });
      });

      block.querySelectorAll(".row-format-select").forEach(select => {
        select.addEventListener("change", (e) => {
          const row = calculatedRows.find(r => r.id === e.target.dataset.rowId);
          if (!row) return;

          row.billedFormat = e.target.value;
          row.editableFormats = buildEditableOptionsForRow(row.billedFormat);

          const newInfo = getPriceInfoByFormat(row.billedFormat, row.colorMode || "bw", row.qty);
          row.tariffCode = newInfo.code;
          row.tariffLabel = newInfo.label;
          row.priceSyncKey = newInfo.syncKey;

          if (!row.priceLocked || !row.priceWasManuallyChanged) {
            row.unitPrice = newInfo.price;
          }

          updateRowDom(row.id, { updatePriceInput: true });
          syncStatesFromCalculatedRows();
          recalcOverallTotal();
        });
      });
    }

    async function downloadSeparatorRowPdf(row) {
      try {
        const state = serviceStates[row.serviceCardId];
        const bytes = state?.sourceBytesByType?.separator;
        const originalFileName = state?.sourceFileNameByType?.separator || "separated";
        if (!bytes || !row.downloadPageNumbers?.length) {
          setStatus("Нет данных для скачивания.", true);
          return;
        }

        const outputBytes = await buildPdfForPageNumbers(bytes, row.downloadPageNumbers);
        triggerPdfDownload(
          outputBytes,
          buildSeparatorFileName(originalFileName, row.colorMode, row.billedFormat, row.downloadPageNumbers)
        );
        setStatus("Файл скачан.");
      } catch (error) {
        console.error(error);
        setStatus("Не удалось скачать PDF.", true);
      }
    }

    async function downloadAllSeparatorPdfs(serviceCardId) {
      try {
        const rows = calculatedRows.filter(r => r.serviceCardId === serviceCardId && r.isSeparatorRow && r.downloadPageNumbers?.length);
        if (!rows.length) {
          setStatus("Нет файлов для скачивания.", true);
          return;
        }

        setStatus("Подготавливаются файлы для скачивания...");

        for (let i = 0; i < rows.length; i++) {
          const row = rows[i];
          const state = serviceStates[row.serviceCardId];
          const bytes = state?.sourceBytesByType?.separator;
          const originalFileName = state?.sourceFileNameByType?.separator || "separated";

          const outputBytes = await buildPdfForPageNumbers(bytes, row.downloadPageNumbers);
          triggerPdfDownload(
            outputBytes,
            buildSeparatorFileName(originalFileName, row.colorMode, row.billedFormat, row.downloadPageNumbers)
          );

          await wait(250);
        }

        setStatus("Все файлы отправлены на скачивание.");
      } catch (error) {
        console.error(error);
        setStatus("Не удалось скачать все PDF.", true);
      }
    }

    async function buildPdfForPageNumbers(sourceBytes, pageNumbers) {
      const sourcePdf = await PDFDocument.load(sourceBytes.slice());
      const newPdf = await PDFDocument.create();
      const pageIndexes = pageNumbers.map(n => n - 1);
      const copiedPages = await newPdf.copyPages(sourcePdf, pageIndexes);

      copiedPages.forEach(p => newPdf.addPage(p));

      return await newPdf.save();
    }

    function triggerPdfDownload(bytes, fileName) {
      const blob = new Blob([bytes], { type: "application/pdf" });
      const url = URL.createObjectURL(blob);

      const a = document.createElement("a");
      a.href = url;
      a.download = fileName;
      a.style.display = "none";
      document.body.appendChild(a);
      a.click();
      a.remove();

      setTimeout(() => URL.revokeObjectURL(url), 3000);
    }

    function buildSeparatorFileName(originalFileName, colorMode, billedFormat, pageNumbers) {
      const cleanName = String(originalFileName || "separated").replace(/\.pdf$/i, "");
      const pages = compressPageRanges(pageNumbers).replaceAll(", ", "_").replaceAll("-", "_");
      const colorLabel = colorMode === "color" ? "цвет" : "чб";
      const formatLabel = sanitizeFileName(String(billedFormat || "формат"));
      return `${sanitizeFileName(cleanName)}__${sanitizeFileName(colorLabel)}__${formatLabel}__стр_${pages}.pdf`;
    }

    function wait(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function updateRowDom(rowId, options = {}) {
      const row = calculatedRows.find(r => r.id === rowId);
      const tr = document.querySelector(`tr[data-row-id="${rowId}"]`);
      if (!row || !tr) return;

      const tds = tr.children;
      if (!tds.length) return;

      tds[0].innerHTML = `
        <div>${escapeHtml(row.tariffCode || "—")}</div>
        <div class="small">${escapeHtml(row.tariffLabel || "—")}</div>
        ${row.isSeparatorRow && row.separatorDownloadable ? `<div><button type="button" class="download-btn download-row-btn" data-row-id="${row.id}">Скачать PDF</button></div>` : ""}
      `;

      tds[1].textContent = row.actualFormatLabel || "—";
      tds[2].textContent = row.customPageNumbers?.length ? compressPageRanges(row.customPageNumbers) : "—";

      const formatSelect = tr.querySelector(".row-format-select");
      if (formatSelect && formatSelect.value !== row.billedFormat) formatSelect.value = row.billedFormat;

      const qtyInput = tr.querySelector(".row-qty-editor");
      if (qtyInput && options.updateQtyInput !== false) qtyInput.value = row.qty;

      const priceInput = tr.querySelector(".row-price-editor");
      if (priceInput && options.updatePriceInput !== false) priceInput.value = formatInputNumber(row.unitPrice);

      const lockBtn = tr.querySelector(".lock-price-btn");
      if (lockBtn) {
        lockBtn.textContent = row.priceLocked ? "🔒" : "🔓";
        lockBtn.classList.toggle("locked", !!row.priceLocked);
      }

      const sumCell = tr.querySelector(".row-sum-cell");
      if (sumCell) sumCell.textContent = money(row.qty * row.unitPrice);
    }

    function rebuildCalculatedRows() {
      calculatedRows = [];
      Object.values(serviceStates).forEach(state => {
        Object.values(state.resultsByType).forEach(rows => calculatedRows.push(...rows));
      });
    }

    function syncStatesFromCalculatedRows() {
      Object.entries(serviceStates).forEach(([id, state]) => {
        Object.keys(state.resultsByType).forEach(type => {
          const knownIds = new Set((state.resultsByType[type] || []).map(r => r.id));
          state.resultsByType[type] = calculatedRows.filter(r => knownIds.has(r.id));
        });
      });
    }

    function restoreServiceResult(block) {
      const id = Number(block.dataset.blockId);
      const type = getCurrentTypeForBlock(block);
      ensureTypeBuckets(id, type);
      renderServiceResult(block);
    }

    function recalcOverallTotal() {
      const total = calculatedRows.reduce((sum, row) => sum + row.qty * row.unitPrice, 0);
      overallTotalBox.style.display = calculatedRows.length ? "block" : "none";
      overallTotalBox.textContent = calculatedRows.length ? `Итого: ${money(total)}` : "";
    }

    function formatSelectHtml(row) {
      const options = row.editableFormats.map(fmt => {
        const selected = fmt === row.billedFormat ? " selected" : "";
        return `<option value="${fmt}"${selected}>${escapeHtml(getFormatDisplayLabel(fmt))}</option>`;
      }).join("");

      return `<select class="row-select row-format-select" data-row-id="${row.id}">${options}</select>`;
    }

    function buildEditableOptionsForRow(currentFormat) {
      const options = new Set(ALL_DOC_OPTIONS);
      if (currentFormat) options.add(currentFormat);
      return [...options].sort(compareFormatKeys);
    }

    function compareFormatKeys(a, b) {
      const order = ["A6","A5","A4","A3","A2","A1","A0"];
      const ia = order.indexOf(a);
      const ib = order.indexOf(b);

      const aWide = parseWideFormatKey(a);
      const bWide = parseWideFormatKey(b);

      if (ia !== -1 && ib !== -1) return ia - ib;
      if (ia !== -1) return -1;
      if (ib !== -1) return 1;

      if (aWide && bWide) {
        const baseOrder = { A4: 1, A3: 2, A2: 3 };
        if (baseOrder[aWide.base] !== baseOrder[bWide.base]) return baseOrder[aWide.base] - baseOrder[bWide.base];
        return aWide.multiplier - bWide.multiplier;
      }

      return String(a).localeCompare(String(b), "ru");
    }

    function getFormatDisplayLabel(key) {
      if (FORMATS[key]) return `${key} (${FORMATS[key].w}×${FORMATS[key].h} мм)`;

      const parsed = parseWideFormatKey(key);
      if (parsed) {
        const size = getWideFormatSize(parsed.base, parsed.multiplier);
        return `${parsed.base}×${parsed.multiplier} (${size.w}×${size.h} мм)`;
      }

      return key;
    }

    function getWideFormatSize(base, multiplier) {
      return {
        w: FORMATS[base].w * multiplier,
        h: FORMATS[base].h
      };
    }

    function parseWideFormatKey(key) {
      const match = /^([A][234])x(\d+)$/i.exec(String(key));
      if (!match) return null;
      return {
        base: match[1].toUpperCase(),
        multiplier: Number(match[2])
      };
    }

    function isWideFormatKey(key) {
      return !!parseWideFormatKey(key);
    }

    function clearAll() {
      servicesContainer.innerHTML = "";
      blockCounter = 1;
      calculatedRows = [];
      Object.keys(serviceStates).forEach(key => delete serviceStates[key]);
      overallTotalBox.style.display = "none";
      overallTotalBox.textContent = "";
      addServiceBlock("separator");
      setStatus("");
    }

    function setStatus(text, isError = false) {
      statusBox.textContent = text || "";
      statusBox.style.color = isError ? "#b00020" : "#444";
    }

    function money(value) {
      return `${Number(value).toFixed(2).replace(".", ",")} ₽`;
    }

    function formatInputNumber(value) {
      if (!isFiniteNumber(value)) return "0.00";
      return Number(value).toFixed(2);
    }

    function parseFlexibleNumber(value) {
      const num = parseFloat(String(value).replace(",", "."));
      return Number.isFinite(num) ? num : 0;
    }

    function parsePositiveInt(value) {
      const num = parseInt(String(value), 10);
      return Number.isFinite(num) && num > 0 ? num : 1;
    }

    function isFiniteNumber(value) {
      return typeof value === "number" && Number.isFinite(value);
    }

    function ptToMm(pt) {
      return pt * 25.4 / 72;
    }

    function round1(num) {
      return Math.round(num * 10) / 10;
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function sanitizeFileName(value) {
      return String(value).replace(/[\\/:*?"<>|]+/g, "_");
    }

    function detectFormat(widthMm, heightMm) {
      for (const [name, size] of Object.entries(FORMATS)) {
        const normalMatch =
          Math.abs(widthMm - size.w) <= TOLERANCE_MM &&
          Math.abs(heightMm - size.h) <= TOLERANCE_MM;

        const rotatedMatch =
          Math.abs(widthMm - size.h) <= TOLERANCE_MM &&
          Math.abs(heightMm - size.w) <= TOLERANCE_MM;

        if (normalMatch || rotatedMatch) return name;
      }
      return "CUSTOM";
    }

    function distanceToFormat(widthMm, heightMm, size) {
      const d1 = Math.abs(widthMm - size.w) + Math.abs(heightMm - size.h);
      const d2 = Math.abs(widthMm - size.h) + Math.abs(heightMm - size.w);
      return Math.min(d1, d2);
    }

    function findNearestFormat(widthMm, heightMm) {
      let best = "A4";
      let bestDistance = Infinity;

      Object.entries(FORMATS).forEach(([name, size]) => {
        const dist = distanceToFormat(widthMm, heightMm, size);
        if (dist < bestDistance) {
          bestDistance = dist;
          best = name;
        }
      });

      return best;
    }

    function buildActualFormatLabel(widthMm, heightMm, exactFormat, billedFormat) {
      const w = round1(widthMm);
      const h = round1(heightMm);

      if (exactFormat !== "CUSTOM") {
        return `${exactFormat} (${FORMATS[exactFormat].w}×${FORMATS[exactFormat].h} мм)`;
      }

      return `≈ ${getFormatDisplayLabel(billedFormat)}, файл: ${w}×${h} мм`;
    }

    function compressPageRanges(pages) {
      const unique = [...new Set((pages || []).filter(n => Number.isFinite(n)).sort((a, b) => a - b))];
      if (!unique.length) return "";

      const ranges = [];
      let start = unique[0];
      let prev = unique[0];

      for (let i = 1; i < unique.length; i++) {
        const current = unique[i];
        if (current === prev + 1) {
          prev = current;
          continue;
        }
        ranges.push(start === prev ? `${start}` : `${start}-${prev}`);
        start = current;
        prev = current;
      }

      ranges.push(start === prev ? `${start}` : `${start}-${prev}`);
      return ranges.join(", ");
    }

    function uniqueStrings(arr) {
      return [...new Set(arr.filter(Boolean))];
    }

    async function detectPageColorMode(page) {
      const viewport = page.getViewport({ scale: 0.5 });
      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d", { willReadFrequently: true });

      canvas.width = Math.max(1, Math.floor(viewport.width));
      canvas.height = Math.max(1, Math.floor(viewport.height));

      await page.render({ canvasContext: ctx, viewport }).promise;
      const { data, width, height } = ctx.getImageData(0, 0, canvas.width, canvas.height);

      let coloredPixels = 0;

      for (let y = 0; y < height; y += SAMPLE_STEP) {
        for (let x = 0; x < width; x += SAMPLE_STEP) {
          const idx = (y * width + x) * 4;
          const r = data[idx];
          const g = data[idx + 1];
          const b = data[idx + 2];
          const a = data[idx + 3];

          if (a < 10) continue;

          if (
            Math.abs(r - g) > COLOR_TOLERANCE ||
            Math.abs(g - b) > COLOR_TOLERANCE ||
            Math.abs(r - b) > COLOR_TOLERANCE
          ) {
            coloredPixels++;
            if (coloredPixels >= 5) return "color";
          }
        }
      }

      return "bw";
    }

    function makeRowId() {
      return "row_" + Math.random().toString(36).slice(2, 11);
    }
  </script>
</body>
