<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Калькулятор печати</title>
  <link href="https://fonts.googleapis.com/css2?family=Geologica:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    :root {
      --bg: #f0f0ed;
      --card: #ffffff;
      --card2: #f7f7f5;
      --line: #e2e2de;
      --line-soft: #eeeeea;
      --text: #1a1a18;
      --muted: #6b6b66;
      --accent: #1a1a18;
      --accent-fg: #ffffff;
      --danger: #c0392b;
      --danger-soft: #fdf0ef;
      --green: #1a7a4a;
      --green-soft: #edf7f2;
      --radius: 16px;
      --radius-sm: 10px;
      --shadow: 0 2px 12px rgba(0,0,0,0.07);
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
    }

    body {
      margin: 0;
      font-family: 'Geologica', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    .app-header {
      background: var(--accent);
      color: var(--accent-fg);
      padding: 20px 32px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .app-logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .app-logo-icon {
      width: 36px;
      height: 36px;
      background: #fff;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .app-title {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin: 0;
    }

    .app-subtitle {
      font-size: 12px;
      opacity: 0.55;
      font-weight: 400;
      margin: 0;
    }

    .header-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    /* ── WRAP ── */
    .wrap {
      max-width: 1280px;
      margin: 0 auto;
      padding: 28px 24px 48px;
    }

    /* ── TOOLBAR ── */
    .toolbar {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .status-pill {
      font-size: 13px;
      color: var(--muted);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 6px 14px;
      min-height: 32px;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color 0.2s;
    }

    .status-pill.error { color: var(--danger); border-color: #f5c6c2; background: var(--danger-soft); }

    /* ── BUTTONS ── */
    button {
      cursor: pointer;
      border: none;
      border-radius: var(--radius-sm);
      padding: 10px 20px;
      font-weight: 700;
      font-size: 14px;
      font-family: inherit;
      transition: opacity 0.15s, transform 0.1s, box-shadow 0.15s;
    }

    button:hover { opacity: 0.88; }
    button:active { transform: scale(0.98); }

    .btn-primary {
      background: var(--accent);
      color: var(--accent-fg);
      box-shadow: 0 2px 8px rgba(0,0,0,0.18);
    }

    .btn-secondary {
      background: var(--card);
      color: var(--text);
      border: 1px solid var(--line);
    }

    .btn-danger {
      background: var(--danger-soft);
      color: var(--danger);
      border: 1px solid #f5c6c2;
    }

    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px dashed var(--line);
    }

    .btn-ghost:hover { color: var(--text); border-color: var(--text); opacity: 1; }

    .btn-sm { padding: 7px 14px; font-size: 13px; border-radius: 8px; }
    .btn-xs { padding: 5px 10px; font-size: 12px; border-radius: 7px; }

    .icon-btn {
      width: 36px;
      min-width: 36px;
      height: 36px;
      padding: 0;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: var(--card);
      font-size: 15px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .icon-btn.locked {
      background: var(--accent);
      color: var(--accent-fg);
      border-color: var(--accent);
    }

    .icon-btn.remove-extra {
      color: var(--danger);
      border-color: #f5c6c2;
      background: var(--danger-soft);
    }

    /* ── SERVICE CARD ── */
    .service-card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      margin-bottom: 20px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 18px 22px;
      border-bottom: 1px solid var(--line-soft);
      background: var(--card2);
    }

    .card-type-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--muted);
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 4px 10px;
      white-space: nowrap;
    }

    .card-type-badge.separator { color: #1a5fa0; border-color: #c3daf5; background: #eff6fd; }
    .card-type-badge.folding { color: #7a4a1a; border-color: #f5dfc3; background: #fdf6ef; }
    .card-type-badge.guillotine { color: #1a7a4a; border-color: #b8e4cc; background: #edf7f2; }

    .card-name-input {
      flex: 1;
      min-width: 0;
      padding: 8px 12px;
      border: 1px solid transparent;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 700;
      font-family: inherit;
      background: transparent;
      color: var(--text);
      transition: border-color 0.15s, background 0.15s;
    }

    .card-name-input:focus {
      outline: none;
      border-color: var(--line);
      background: var(--card);
    }

    .card-body {
      padding: 22px;
    }

    /* ── GRID ── */
    .grid-2 {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }

    .col-span-full { grid-column: 1 / -1; }

    /* ── FIELD ── */
    .field { display: flex; flex-direction: column; gap: 6px; }

    .field label {
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    input[type="text"],
    input[type="number"],
    select {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-family: inherit;
      background: var(--card);
      color: var(--text);
      height: 42px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    input[type="text"]:focus,
    input[type="number"]:focus,
    select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(26,26,24,0.08);
    }

    input[type="number"] {
      text-align: center;
      -moz-appearance: textfield;
    }

    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button { display: none; }

    /* ── FILE UPLOAD AREA ── */
    .file-upload-area {
      border: 2px dashed var(--line);
      border-radius: var(--radius-sm);
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      background: var(--card2);
      position: relative;
    }

    .file-upload-area:hover,
    .file-upload-area.dragover {
      border-color: var(--accent);
      background: #f5f5f2;
    }

    .file-upload-area input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      height: 100%;
      width: 100%;
    }

    .file-upload-icon { font-size: 28px; margin-bottom: 8px; }
    .file-upload-label { font-size: 14px; font-weight: 600; color: var(--text); }
    .file-upload-hint { font-size: 12px; color: var(--muted); margin-top: 4px; }

    .file-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 10px;
    }

    .file-chip {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: var(--green-soft);
      border: 1px solid #b8e4cc;
      border-radius: 8px;
      font-size: 13px;
    }

    .file-chip-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--green); font-weight: 600; }
    .file-chip-remove { cursor: pointer; color: var(--muted); font-size: 16px; line-height: 1; padding: 0 2px; background: none; border: none; }
    .file-chip-remove:hover { color: var(--danger); }

    /* ── FOLDING OPTIONS ── */
    .fold-option-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 10px;
      margin-top: 14px;
    }

    .fold-option-card {
      border: 1.5px solid var(--line);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      user-select: none;
    }

    .fold-option-card:hover { border-color: var(--accent); }
    .fold-option-card.active { border-color: var(--accent); background: #f0f0ed; }

    .fold-option-title { font-size: 13px; font-weight: 700; }
    .fold-option-price { font-size: 12px; color: var(--muted); margin-top: 3px; }

    /* ── CARD FOOTER ── */
    .card-footer {
      padding: 16px 22px;
      border-top: 1px solid var(--line-soft);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: var(--card2);
    }

    /* ── RESULT SECTION ── */
    .result-section {
      border-top: 2px solid var(--line-soft);
      display: none;
    }

    .result-section.visible { display: block; }

    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 22px;
      cursor: pointer;
      user-select: none;
    }

    .result-header:hover { background: var(--card2); }

    .result-title { font-size: 15px; font-weight: 700; }
    .result-subtotal {
      font-size: 18px;
      font-weight: 800;
      color: var(--accent);
    }
    .result-chevron { font-size: 16px; color: var(--muted); transition: transform 0.2s; }
    .result-chevron.open { transform: rotate(180deg); }

    .result-body {
      padding: 0 22px 20px;
    }

    .result-body.collapsed { display: none; }

    /* ── DOWNLOAD ACTIONS ── */
    .download-actions {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    /* ── TABLE ── */
    .table-wrap {
      width: 100%;
      overflow-x: auto;
      border-radius: var(--radius-sm);
      border: 1px solid var(--line);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      min-width: 700px;
    }

    th, td {
      vertical-align: middle;
      padding: 11px 14px;
      border-bottom: 1px solid var(--line-soft);
      font-size: 13.5px;
    }

    th {
      background: #f7f7f5;
      font-weight: 700;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      color: var(--muted);
      white-space: nowrap;
      text-align: left;
    }

    td { text-align: left; }
    td.center { text-align: center; }
    td.right { text-align: right; }

    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafafa; }

    .cell-code { font-size: 12px; color: var(--muted); font-weight: 500; }
    .cell-label { font-size: 13px; font-weight: 500; line-height: 1.3; }
    .cell-size { font-size: 13px; font-family: monospace; color: var(--muted); }

    .sum-cell {
      font-size: 16px;
      font-weight: 800;
      white-space: nowrap;
      text-align: right !important;
    }

    .row-qty-input, .row-price-input {
      width: 90px;
      text-align: center;
      height: 36px;
      padding: 6px 10px;
      font-size: 13px;
    }

    .price-edit-box {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* ── NOTE ── */
    .note-box {
      margin-top: 14px;
      padding: 12px 16px;
      background: #fffbee;
      border: 1px solid #f0e0a0;
      border-radius: var(--radius-sm);
      font-size: 13px;
      line-height: 1.6;
      color: #5a4a00;
    }

    /* ── BOTTOM TOTAL ── */
    .bottom-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-top: 8px;
      flex-wrap: wrap;
    }

    .total-block {
      background: var(--accent);
      color: var(--accent-fg);
      border-radius: var(--radius);
      padding: 18px 28px;
      display: none;
    }

    .total-block.visible { display: block; }
    .total-label { font-size: 12px; opacity: 0.6; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
    .total-amount { font-size: 40px; font-weight: 800; letter-spacing: -1px; line-height: 1; }

    /* ── SEPARATOR PROGRESS ── */
    .progress-bar-wrap {
      height: 4px;
      background: var(--line);
      border-radius: 2px;
      margin-top: 10px;
      overflow: hidden;
      display: none;
    }

    .progress-bar-wrap.visible { display: block; }

    .progress-bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.3s;
      width: 0%;
    }

    /* ── HEADER BTN INVERSE ── */
    .btn-inverse {
      background: rgba(255,255,255,0.15);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.25);
      backdrop-filter: blur(4px);
    }

    .btn-inverse:hover { background: rgba(255,255,255,0.25); opacity: 1; }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    .empty-state-icon { font-size: 48px; margin-bottom: 16px; }
    .empty-state-title { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
    .empty-state-sub { font-size: 14px; }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .grid-2, .grid-3 { grid-template-columns: 1fr; }
      .app-header { padding: 14px 18px; }
      .wrap { padding: 18px 14px 40px; }
      .card-body, .result-body { padding: 16px; }
      .card-header, .card-footer { padding: 14px 16px; }
      .result-header { padding: 12px 16px; }
      .total-amount { font-size: 32px; }
      .bottom-bar { flex-direction: column; align-items: stretch; }
    }

    /* Drag & drop highlight */
    .service-card.drag-highlight { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(26,26,24,0.12); }
  </style>
</head>
<body>

  <header class="app-header">
    <div class="app-logo">
      <div class="app-logo-icon">🖨</div>
      <div>
        <div class="app-title">Калькулятор печати</div>
        <div class="app-subtitle">Разделитель · Фальцовка</div>
      </div>
    </div>
    <div class="header-actions">
      <button class="btn-inverse btn-sm" id="calculateAllBtn">Рассчитать все</button>
      <button class="btn-inverse btn-sm" id="clearBtn">Сбросить</button>
    </div>
  </header>

  <div class="wrap">
    <div class="toolbar">
      <button class="btn-primary" id="addSeparatorBtn">+ Разделитель</button>
      <button class="btn-secondary" id="addFoldingBtn">+ Фальцовка</button>
      <button class="btn-secondary" id="addGuillotineBtn">+ Гильотина</button>
      <div id="status" class="status-pill" style="display:none;"></div>
    </div>

    <div id="servicesContainer"></div>

    <div class="bottom-bar">
      <div></div>
      <div id="totalBlock" class="total-block">
        <div class="total-label">Итого</div>
        <div id="totalAmount" class="total-amount"></div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>

          '<div class="empty-state-sub">Проверьте подключение к интернету и обновите страницу</div></div>';
        return;
      }
      pdfjsLib.GlobalWorkerOptions.workerSrc =

      },

      },

        bw: {
          A4: { 3:52,4:69,5:86,6:104,7:121,8:138 },
          A3: { 3:104,4:138,5:173,6:207,7:242,8:276 },
          A2: { 3:207,4:276,5:345,6:414 }
        },
        color: {
          A4: { 3:60,4:81,5:101,6:121,7:141,8:161 },
          A3: { 3:121,4:161,5:201,6:242,7:282,8:322 },
          A2: { 3:242,4:322,5:403,6:483 }
        }
      }
    };

    // ── STATE ──────────────────────────────────────────────────────
    let blockCounter = 1;
    let calculatedRows = [];
    const serviceStates = {};

    // ── DOM REFS ───────────────────────────────────────────────────
    const container = document.getElementById("servicesContainer");
    const statusEl = document.getElementById("status");
    const totalBlock = document.getElementById("totalBlock");
    const totalAmount = document.getElementById("totalAmount");

    document.getElementById("addSeparatorBtn").addEventListener("click", () => addBlock("separator"));
    document.getElementById("addFoldingBtn").addEventListener("click", () => addBlock("folding"));
    document.getElementById("addGuillotineBtn").addEventListener("click", () => addBlock("guillotine"));
    document.getElementById("calculateAllBtn").addEventListener("click", calcAll);
    document.getElementById("clearBtn").addEventListener("click", clearAll);

    // ── ADD BLOCK ──────────────────────────────────────────────────
    function addBlock(type) {
      const id = blockCounter++;

      serviceStates[id] = {
        type,
        files: type === "separator" ? [] : undefined,
        foldLines: type === "folding" ? [] : undefined,
        rows: [],
        notes: [],
        collapsed: false
      };

        : type === "folding" ? `Фальцовка #${id}`

    }

    function renderSeparatorBody(id) {

    // ══════════════════════════════════════════════════════════════
    // ── ГИЛЬОТИНА ─────────────────────────────────────────────────
    // ══════════════════════════════════════════════════════════════

    function renderGuillotineBody(id) {
      return `<div id="guillotine-ui-${id}"></div>`;
    }

    function initGuillotine(card, id) {

      root.innerHTML = `

          <div>
            <div class="g-section-title">Поля от края листа до первого макета</div>
            <div class="grid-3">

              <div class="field"><label>Зазор X между макетами, мм</label><input type="number" class="g-input" id="g-gap-x-${id}" value="0" min="0" step="0.1"></div>
              <div class="field"><label>Сверху, мм</label><input type="number" class="g-input" id="g-margin-top-${id}" value="9" min="0" step="0.1"></div>
              <div class="field"><label>Снизу, мм</label><input type="number" class="g-input" id="g-margin-bottom-${id}" value="9" min="0" step="0.1"></div>
              <div class="field"><label>Зазор Y между макетами, мм</label><input type="number" class="g-input" id="g-gap-y-${id}" value="0" min="0" step="0.1"></div>
            </div>
          </div>
          <div>
            <div class="g-section-title">Сетка</div>
            <div class="grid-3">
              <div class="field"><label>Колонок</label><input type="number" class="g-input" id="g-cols-${id}" value="3" min="1"></div>
              <div class="field"><label>Строк</label><input type="number" class="g-input" id="g-rows-${id}" value="8" min="1"></div>
              <div></div>
            </div>
          </div>
          <div>

            <div class="grid-3">
              <div class="field"><label>Минимальный рез, мм</label><input type="number" class="g-input" id="g-min-cut-${id}" value="50" min="0" step="0.1"></div>
              <div class="field"><label>Брусок на упоре, мм (0 = нет)</label><input type="number" class="g-input" id="g-block-${id}" value="6.5" min="0" step="0.1"></div>
              <div></div>
            </div>
          </div>
          <div>
            <button type="button" class="btn-primary" id="g-calc-btn-${id}">Рассчитать инструкцию</button>

      `;

      if (!document.getElementById("g-styles")) {
        const s = document.createElement("style");
        s.id = "g-styles";
        s.textContent = `
          .g-section-title { font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.4px;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--line-soft); }
          .g-step { display:flex;gap:14px;align-items:flex-start;padding:14px 16px;border-radius:10px;border:1px solid var(--line);margin-bottom:8px;background:#fff; }
          .g-step-num { width:28px;min-width:28px;height:28px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800; }
          .g-step-body { flex:1; }
          .g-step-action { font-size:14px;font-weight:700;margin-bottom:4px; }
          .g-step-detail { font-size:13px;color:#444;line-height:1.6; }
          .g-step-values { display:flex;gap:10px;margin-top:8px;flex-wrap:wrap; }
          .g-val-chip { background:#f0f0ed;border:1px solid var(--line);border-radius:8px;padding:5px 12px;font-size:13px;font-weight:600; }
          .g-val-chip span { color:var(--muted);font-weight:400;font-size:12px; }
          .g-phase-label { font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.3px;margin:18px 0 8px; }
          .g-warn { background:#fffbee;border:1px solid #f0e0a0;border-radius:10px;padding:12px 16px;font-size:13px;color:#5a4a00;margin-bottom:12px; }
          .g-error { background:var(--danger-soft);border:1px solid #f5c6c2;border-radius:10px;padding:12px 16px;font-size:13px;color:var(--danger);margin-bottom:12px; }
          .g-summary { background:var(--green-soft);border:1px solid #b8e4cc;border-radius:12px;padding:16px 20px;margin-bottom:16px;font-size:14px;line-height:1.6; }
          .g-note { font-size:12px;color:var(--muted);margin-top:5px; }
        `;
        document.head.appendChild(s);
      }

      document.getElementById(`g-calc-btn-${id}`).addEventListener("click", () => calcGuillotine(id));
    }

    function gVal(id, field) {
      return parseFloat(document.getElementById(`g-${field}-${id}`)?.value || "0") || 0;
    }

    function fmt(n) {
      const r = Math.round(n * 10) / 10;
      return r % 1 === 0 ? String(r) : r.toFixed(1);
    }

    // Core idea:
    // - A cut value = distance from blade to stop = the piece that STAYS against the stop (the smaller piece)
    // - "From large to small" means: we always position so the CUT-OFF piece is the larger one,
    //   and the piece staying at the stop is the smaller one — BUT that smaller piece must be >= minCut
    // - If the piece to keep at stop < minCut: we flip — keep the large piece at stop, cut off the small margin
    //   But then the measurement = large piece size, which must be >= minCut. Usually it is.
    // - After each cut the current piece size decreases — all subsequent measurements use the new size

    function calcGuillotine(id) {
      const sheetW = gVal(id,"sheet-w"), sheetH = gVal(id,"sheet-h");
      const itemW  = gVal(id,"item-w"),  itemH  = gVal(id,"item-h");
      const finalW = gVal(id,"final-w"), finalH = gVal(id,"final-h");
      const mL = gVal(id,"margin-left"), mR = gVal(id,"margin-right");
      const mT = gVal(id,"margin-top"),  mB = gVal(id,"margin-bottom");
      const gapX = gVal(id,"gap-x"), gapY = gVal(id,"gap-y");
      const cols = Math.max(1,Math.round(gVal(id,"cols")));
      const rows = Math.max(1,Math.round(gVal(id,"rows")));
      const minCut = gVal(id,"min-cut");
      const block  = gVal(id,"block");
      const resultEl = document.getElementById(`g-result-${id}`);

      // Geometry check
      const warnings = [];
      const expW = mL + cols*itemW + (cols-1)*gapX + mR;
      const expH = mT + rows*itemH + (rows-1)*gapY + mB;
      if (Math.abs(expW-sheetW)>0.5) warnings.push(`Ширина: поля+макеты = ${fmt(expW)} мм, лист = ${fmt(sheetW)} мм.`);
      if (Math.abs(expH-sheetH)>0.5) warnings.push(`Высота: поля+макеты = ${fmt(expH)} мм, лист = ${fmt(sheetH)} мм.`);

      const bleedH = (itemH - finalH) / 2;
      const bleedW = (itemW - finalW) / 2;
      const steps  = [];

      // ── Core logic ────────────────────────────────────────────
      // Rules:
      //   1. Upor (stop) holds the BIG piece. Scale value = size of big piece.
      //   2. Scale value must be >= minCut.
      //   3. Scale value <= current piece size (obvious).
      //   4. To avoid sheet swinging: cut-off must be <= stop piece.
      //      i.e. cut-off <= pieceSize/2, i.e. stop >= pieceSize/2. 
      //      This means we always cut off the SMALLER half.
      //   5. Cut off the smaller margin first (smallest cut-off = easiest first step).
      //      Then cut strips of itemSize from the same direction.
      //      When the remaining big piece minus itemSize would be < minCut,
      //      flip the piece and approach from the other end for remaining strips.
      //
      // For each axis we build steps with:
      //   stopVal = value to set on the machine (size of big piece kept at stop)
      //   pieceSize = current piece size before this cut
      //   cutOff = pieceSize - stopVal (small piece that falls off)

      // axisSteps: simple and correct guillotine sequence
      // ─────────────────────────────────────────────────────────
      // Concept (as user described):
      //   1. Trim the near margin (upor = total - mNear, big piece at stop, margin falls off)
      //   2. Repeat N-1 times: upor = item (constant), each time one strip falls off the feed side
      //   3. Last piece = item + mFar. Flip, trim far margin: upor = item, margin falls off.
      //
      // The upor value for strip cuts = item (constant, same every time).
      // For the margin cuts: upor = total - margin (large value, always >= minCut).
      // If item < minCut → warn. Otherwise all steps are valid.
      //
      // "Near" = the side we feed first (the side whose margin we trim first).
      // We choose near = the side with the SMALLER margin, so first cut-off is smallest.
      // If both margins equal, near = "top" for H, "left" for V.
      //
      // Upor = size of the piece that stays at the stop (the big piece).
      // For margin trim: big piece = total - margin (rest of sheet). Upor = total - margin.
      // For strip cuts:  big piece = remaining block (total - margin - strips_cut_so_far).
      //                  Upor = remaining - item  (the strip falls off the front).
      //                  BUT after first strip: upor changes each time (remaining shrinks).
      //
      // WAIT — re-reading user's description more carefully:
      // "Отрезаю поле, затем визитки по строкам" with the same stop value each time.
      // This is ONLY possible if after trimming the margin the remaining = count * item (+ gaps),
      // and each strip cut uses upor = (count-k) * item where k = strips already cut.
      // These values DECREASE: count*item → (count-1)*item → ... → item.
      // 
      // So the sequence of upor values is DESCENDING for strip cuts.
      // That is physically fine — each time you just move the stop closer.
      // The user's "-4, -50, -4, -50" was describing the CUT-OFF sizes alternating (margin, strip, margin, strip...),
      // not the upor values.
      //
      // FINAL CORRECT SEQUENCE:
      //   Step 1: Trim near margin. Upor = total - mNear. (Large, set once.)
      //   Steps 2..N: Cut strips 1..(count-1). Upor decreases by item each time.
      //               Upor_k = total - mNear - k*item - k_gaps  for k=1..count-1
      //               Equivalently: upor starts at (total-mNear-item) and decreases by (item+gap) each step.
      //   Step N+1: Last piece = item + mFar. Flip. Trim far margin. Upor = item.
      //
      // All upor values >= minCut as long as item >= minCut (warn if not).

      function axisSteps(total, mNear, mFar, count, item, gap, isH) {
        // isH = true  → горизонтальные резы (вдоль высоты листа 450 мм)
        //   "near" = верх листа (mT), "far" = низ листа (mB)
        //   лист стоит вертикально (портрет), подаём короткой стороной к лезвию
        // isH = false → вертикальные резы (вдоль ширины листа 320 мм)
        //   "near" = левый край (mL), "far" = правый край (mR)

        const S = [];
        const farLabel  = isH ? "нижнего" : "правого";
        const nearLabel = isH ? "верхнего" : "левого";
        const edgeNear  = isH ? "верхний край" : "левый край";
        const edgeFar   = isH ? "нижний край" : "правый край";
        const stripWord = isH ? "полоса" : "колонка";

        // Всегда начинаем с МЕНЬШЕГО поля — оно отрезается первым
        const startFromFar = mFar <= mNear;
        const firstMargin  = startFromFar ? mFar : mNear;
        const lastMargin   = startFromFar ? mNear : mFar;
        const firstEdge    = startFromFar ? edgeFar : edgeNear;
        const lastEdge     = startFromFar ? edgeNear : edgeFar;
        const firstLabel   = startFromFar ? farLabel : nearLabel;
        const lastLabel    = startFromFar ? nearLabel : farLabel;

        // ── Шаг 1: отрезать меньшее поле ─────────────────────────
        // Подаём firstEdge к упору. Упор = total − firstMargin.
        // Маленькое поле (firstMargin) падает с другой стороны.
        if (firstMargin > 0.001) {
          const sv = total - firstMargin;
          S.push(step(
            `Обрезка ${firstLabel} поля`,
            `Подайте ${firstEdge} к упору. Отрезается поле ${fmt(firstMargin)} мм — в отход.`,
            sv, total
          ));
        }

        // ── Шаги: резать полосы с ПОСТОЯННЫМ упором = item ───────
        // Тот же край у упора. Упор не меняем — каждый раз item мм.
        // Отрезанная полоса падает с противоположной стороны — откладываем.
        for (let i = 1; i <= count - 1; i++) {
          S.push(step(
            `${isH ? "Полоса" : "Колонка"} ${i} из ${count}`,
            `${firstEdge.charAt(0).toUpperCase() + firstEdge.slice(1)} к упору, упор ${fmt(item)} мм. Отрезается ${stripWord} ${i} — отложите.`,
            item, null
          ));

          if (gap > 0.001) {
            S.push(step(
              `Зазор`,
              `Тот же край к упору, упор ${fmt(gap)} мм. Зазор — в отход.`,
              gap, null
            ));
          }
        }

        // ── Последний кусок: полоса + второе (большее) поле ──────
        // Кусок = item + lastMargin. Переворачиваем — подаём lastEdge к упору.
        // Упор = item. Поле (lastMargin) отрезается и падает.
        if (lastMargin > 0.001) {
          const pieceSize = item + lastMargin;
          S.push(step(
            `${isH ? "Полоса" : "Колонка"} ${count} из ${count} — обрезка ${lastLabel} поля`,
            `Последний кусок ${fmt(pieceSize)} мм. Переверните — ${lastEdge} к упору, упор ${fmt(item)} мм. Поле ${fmt(lastMargin)} мм — в отход.`,
            item, pieceSize
          ));
        }

        return S;
      }

      // stopVal = значение на шкале гильотины (без бруска)
      // pieceSize = текущий размер куска (null = упор константный, не зависит от остатка)
      function step(action, detail, stopVal, pieceSize) {
        const tooSmall = stopVal < minCut - 0.05;
        return { action, detail, stopVal, pieceSize, tooSmall };
      }

      // Phase 1: horizontal cuts (rows)
      steps.push({ phase: "ФАЗА 1 — Горизонтальные резы: выделяем строки" });
      for (const s of axisSteps(sheetH, mT, mB, rows, itemH, gapY, true)) steps.push(s);

      // Phase 2: bleed trim (height)
      if (bleedH > 0.05) {
        steps.push({ phase: `ФАЗА 2 — Вылет по высоте ${fmt(bleedH)} мм (каждую полосу)` });
        steps.push(step("Вылет — первая сторона",
          `Каждую полосу (${fmt(itemH)} мм) подайте к упору. Обрежьте вылет ${fmt(bleedH)} мм.`,
          itemH - bleedH, itemH));
        steps.push(step("Вылет — вторая сторона",
          `Переверните. Подайте другим краем. Обрежьте вылет ${fmt(bleedH)} мм → финал ${fmt(finalH)} мм.`,
          finalH, itemH - bleedH));
      }

      // Phase 3: vertical cuts (columns)
      steps.push({ phase: "ФАЗА 3 — Вертикальные резы: выделяем колонки (для каждой полосы)" });
      for (const s of axisSteps(sheetW, mL, mR, cols, itemW, gapX, false)) steps.push(s);

      // Phase 4: bleed trim (width)
      if (bleedW > 0.05) {
        steps.push({ phase: `ФАЗА 4 — Вылет по ширине ${fmt(bleedW)} мм (каждую колонку)` });
        steps.push(step("Вылет — первая сторона",
          `Каждую колонку (${fmt(itemW)} мм) подайте к упору. Обрежьте вылет ${fmt(bleedW)} мм.`,
          itemW - bleedW, itemW));
        steps.push(step("Вылет — вторая сторона",
          `Переверните. Подайте другим краем. Обрежьте вылет ${fmt(bleedW)} мм → финал ${fmt(finalW)} мм.`,
          finalW, itemW - bleedW));
      }

      // ── Render ────────────────────────────────────────────────
      const actionSteps = steps.filter(s => s.stopVal !== undefined);
      const totalItems  = cols * rows;

      let html = `<div style="margin-top:20px;">
        <div class="g-summary">
          <strong>${totalItems} изделий</strong> ${fmt(finalW)}×${fmt(finalH)} мм
          из листа ${fmt(sheetW)}×${fmt(sheetH)} мм, сетка ${cols}×${rows} —
          итого <strong>${actionSteps.length} резов</strong>.
        </div>`;

      if (warnings.length)
        html += warnings.map(w => `<div class="g-warn">⚠️ ${escapeHtml(w)}</div>`).join("");

      let stepNum = 0;
      for (const s of steps) {
        if (s.phase) {
          html += `<div class="g-phase-label">✂️ ${escapeHtml(s.phase)}</div>`;
        } else {
          stepNum++;
          html += `<div class="g-step">
            <div class="g-step-num">${stepNum}</div>
            <div class="g-step-body">
              <div class="g-step-action">${escapeHtml(s.action)}</div>
              <div class="g-step-detail">${escapeHtml(s.detail)}</div>
              <div class="g-step-values">
                <div class="g-val-chip">На шкале: <span>${fmt(s.stopVal)} мм</span></div>
                ${block > 0 ? `<div class="g-val-chip" style="background:#edf7f2;border-color:#b8e4cc;">С бруском: <span>${fmt(Math.max(0, s.stopVal - block))} мм</span></div>` : ""}
                ${s.pieceSize !== null && s.pieceSize !== undefined ? `<div class="g-val-chip" style="font-size:11px;color:var(--muted)">отрезается: ${fmt(s.pieceSize - s.stopVal)} мм</div>` : ""}
              </div>
              ${s.tooSmall ? `<div style="margin-top:6px;padding:8px 12px;background:var(--danger-soft);border:1px solid #f5c6c2;border-radius:8px;font-size:12px;color:var(--danger);">🚫 Упор ${fmt(s.stopVal)} мм < минимального реза (${fmt(minCut)} мм). Пересмотрите раскладку.</div>` : ""}
            </div>
          </div>`;
        }
      }

      html += `</div>`;
      resultEl.innerHTML = html;
    }
    // ── FOLD PRICE DATA ────────────────────────────────────────────
    // Base prices from pricelist (per sheet of that exact format)
    const FOLD_PRICES = {
      "A3-A4": { price: 8,  code: "1110", label: "Фальцевание А3 → А4" },
      "A2-A4": { price: 18, code: "1111", label: "Фальцевание А2 → А4" },
      "A1-A4": { price: 26, code: "1112", label: "Фальцевание А1 → А4" },
      "A2-A3": { price: 18, code: "1113", label: "Фальцевание А2 → А3" },
      "A1-A3": { price: 26, code: "1114", label: "Фальцевание А1 → А3" },
      "custom-A4": { price: 5, code: "1115", label: "Фальцевание нестандарт → А4" }
    };

    // Area in A4 units: A4=1, A3=2, A2=4, A1=8, A0=16
    const FMT_AREA = { A4:1, A3:2, A2:4, A1:8, A0:16, A5:0.5, A6:0.25 };

    const FOLD_DIRECTION_OPTS = [
      { key: "A3-A4",     label: "А3 → А4",          baseArea: 2 },
      { key: "A2-A4",     label: "А2 → А4",          baseArea: 4 },
      { key: "A1-A4",     label: "А1 → А4",          baseArea: 8 },
      { key: "A2-A3",     label: "А2 → А3",          baseArea: 4 },
      { key: "A1-A3",     label: "А1 → А3",          baseArea: 8 },
      { key: "custom-A4", label: "Нестандарт → А4",  baseArea: 1 }
    ];

    const FOLD_FORMAT_OPTS = [
      "A3","A2","A1","A0",
      "A4x3","A4x4","A4x5","A4x6","A4x7","A4x8",
      "A3x3","A3x4","A3x5","A3x6","A3x7","A3x8",
      "A2x3","A2x4","A2x5","A2x6"
    ];

    function foldFormatArea(fmt) {
      if (FMT_AREA[fmt]) return FMT_AREA[fmt];
      const m = /^([A][234])x(\d+)$/i.exec(fmt);
      if (m) return (FMT_AREA[m[1].toUpperCase()] || 1) * Number(m[2]);
      return 1;
    }

    function foldFormatLabel(fmt) {
      if (FORMATS[fmt]) return `${fmt} (${FORMATS[fmt].w}×${FORMATS[fmt].h} мм)`;
      const m = /^([A][234])x(\d+)$/i.exec(fmt);
      if (m) {
        const base = m[1].toUpperCase(), n = Number(m[2]);
        return `${base}×${n} (${FORMATS[base].w * n}×${FORMATS[base].h} мм)`;
      }
      return fmt;
    }

    function calcLineFoldPrice(dirKey, fmt) {
      const t = FOLD_PRICES[dirKey];
      if (!t) return { price: 0, priceLabel: "—" };
      if (dirKey === "custom-A4") return { price: t.price, priceLabel: `${t.price} ₽` };
      const dir = FOLD_DIRECTION_OPTS.find(d => d.key === dirKey);
      const baseArea = dir ? dir.baseArea : 1;
      const sheetArea = foldFormatArea(fmt);
      const ratio = sheetArea / baseArea;
      const price = Math.round(t.price * ratio * 100) / 100;
      return { price, priceLabel: `${price} ₽` };
    }

    function renderFoldingBody(id) {
      // Rendered after DOM insert, so just a container
      return `<div id="fold-ui-${id}"></div>`;
    }

    function initFoldingLines(card, id) {
      const state = serviceStates[id];
      if (!state.foldLines || !state.foldLines.length) {
        state.foldLines = [{ direction: "A2-A4", format: "A2", qty: 1 }];
      }
      buildFoldUI(card, id);
    }

    function buildFoldUI(card, id) {
      const state = serviceStates[id];
      const root = document.getElementById(`fold-ui-${id}`);
      if (!root) return;

      // Build header row + data rows
      const dirOpts = FOLD_DIRECTION_OPTS.map(d =>
        `<option value="${d.key}">${d.label}</option>`
      ).join("");

      const fmtOpts = FOLD_FORMAT_OPTS.map(f =>
        `<option value="${f}">${foldFormatLabel(f)}</option>`
      ).join("");

      root.innerHTML = `
        <div style="overflow-x:auto;">
          <table style="width:100%;border-collapse:collapse;min-width:500px;">
            <thead>
              <tr>
                <th style="text-align:left;padding:8px 10px;font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.3px;background:#f7f7f5;border-bottom:1px solid var(--line);">Направление</th>
                <th style="text-align:left;padding:8px 10px;font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.3px;background:#f7f7f5;border-bottom:1px solid var(--line);">Формат листа</th>
                <th style="text-align:center;padding:8px 10px;font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.3px;background:#f7f7f5;border-bottom:1px solid var(--line);">Кол-во</th>
                <th style="text-align:right;padding:8px 10px;font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.3px;background:#f7f7f5;border-bottom:1px solid var(--line);">Цена/лист</th>
                <th style="text-align:right;padding:8px 10px;font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.3px;background:#f7f7f5;border-bottom:1px solid var(--line);">Сумма</th>
                <th style="background:#f7f7f5;border-bottom:1px solid var(--line);width:40px;"></th>
              </tr>
            </thead>
            <tbody id="fold-tbody-${id}">
              ${state.foldLines.map((line, idx) => buildFoldRow(id, line, idx, dirOpts, fmtOpts)).join("")}
            </tbody>
            <tfoot>
              <tr>
                <td colspan="4" style="padding:10px;border-top:2px solid var(--line);font-size:13px;font-weight:700;">Итого</td>
                <td style="padding:10px;border-top:2px solid var(--line);text-align:right;font-size:18px;font-weight:800;" id="fold-total-${id}">${calcFoldTotal(state.foldLines)}</td>
                <td style="border-top:2px solid var(--line);"></td>
              </tr>
            </tfoot>
          </table>
        </div>
        <div style="margin-top:12px;">
          <button type="button" class="btn-ghost btn-sm add-fold-line-btn">+ Добавить строку</button>
        </div>
      `;

      bindFoldUI(card, id);
    }

    function buildFoldRow(id, line, idx, dirOpts, fmtOpts) {
      const { price } = calcLineFoldPrice(line.direction, line.format);
      const sum = price * (line.qty || 1);
      return `
        <tr data-fold-idx="${idx}" style="border-bottom:1px solid var(--line-soft);">
          <td style="padding:8px 10px;">
            <select class="fold-dir" data-idx="${idx}"
              style="width:100%;padding:8px 10px;border:1px solid var(--line);border-radius:8px;font-size:13px;font-family:inherit;background:#fff;height:38px;">
              ${FOLD_DIRECTION_OPTS.map(d =>
                `<option value="${d.key}" ${d.key === line.direction ? "selected" : ""}>${d.label}</option>`
              ).join("")}
            </select>
          </td>
          <td style="padding:8px 10px;">
            <select class="fold-fmt" data-idx="${idx}"
              style="width:100%;padding:8px 10px;border:1px solid var(--line);border-radius:8px;font-size:13px;font-family:inherit;background:#fff;height:38px;">
              ${FOLD_FORMAT_OPTS.map(f =>
                `<option value="${f}" ${f === line.format ? "selected" : ""}>${foldFormatLabel(f)}</option>`
              ).join("")}
            </select>
          </td>
          <td style="padding:8px 10px;text-align:center;">
            <input type="number" class="fold-qty" data-idx="${idx}" min="1" step="1" value="${line.qty}"
              style="width:80px;text-align:center;padding:8px;border:1px solid var(--line);border-radius:8px;font-size:13px;font-family:inherit;background:#fff;height:38px;">
          </td>
          <td style="padding:8px 10px;text-align:right;font-size:14px;font-weight:600;" class="fold-unit-${id}-${idx}">${price.toFixed(2).replace(".",",")} ₽</td>
          <td style="padding:8px 10px;text-align:right;font-size:15px;font-weight:800;" class="fold-sum-${id}-${idx}">${money(sum)}</td>
          <td style="padding:8px 10px;">
            <button type="button" class="fold-del icon-btn" data-idx="${idx}"
              style="color:var(--danger);border-color:#f5c6c2;background:var(--danger-soft);">✕</button>
          </td>
        </tr>
      `;
    }

    function calcFoldTotal(lines) {
      const total = (lines || []).reduce((s, line) => {
        const { price } = calcLineFoldPrice(line.direction, line.format);
        return s + price * (line.qty || 1);
      }, 0);
      return money(total);
    }

    function bindFoldUI(card, id) {
      const state = serviceStates[id];
      const root = document.getElementById(`fold-ui-${id}`);

      function updateRow(idx) {
        const line = state.foldLines[idx];
        const { price } = calcLineFoldPrice(line.direction, line.format);
        const sum = price * (line.qty || 1);
        const unitEl = root.querySelector(`.fold-unit-${id}-${idx}`);
        const sumEl = root.querySelector(`.fold-sum-${id}-${idx}`);
        if (unitEl) unitEl.textContent = price.toFixed(2).replace(".",",") + " ₽";
        if (sumEl) sumEl.textContent = money(sum);
        updateFoldTotal(id, state);
        updateTotal();
      }

      root.querySelectorAll(".fold-dir").forEach(sel => {
        sel.addEventListener("change", () => {
          const idx = Number(sel.dataset.idx);
          state.foldLines[idx].direction = sel.value;
          updateRow(idx);
        });
      });

      root.querySelectorAll(".fold-fmt").forEach(sel => {
        sel.addEventListener("change", () => {
          const idx = Number(sel.dataset.idx);
          state.foldLines[idx].format = sel.value;
          updateRow(idx);
        });
      });

      root.querySelectorAll(".fold-qty").forEach(inp => {
        inp.addEventListener("input", () => {
          const idx = Number(inp.dataset.idx);
          state.foldLines[idx].qty = Math.max(1, parseInt(inp.value) || 1);
          updateRow(idx);
        });
      });

      root.querySelectorAll(".fold-del").forEach(btn => {
        btn.addEventListener("click", () => {
          state.foldLines.splice(Number(btn.dataset.idx), 1);
          buildFoldUI(card, id);
          updateTotal();
        });
      });

      root.querySelector(".add-fold-line-btn").addEventListener("click", () => {
        state.foldLines.push({ direction: "A2-A4", format: "A2", qty: 1 });
        buildFoldUI(card, id);
      });
    }

    function updateFoldTotal(id, state) {
      const el = document.getElementById(`fold-total-${id}`);
      if (el) el.textContent = calcFoldTotal(state.foldLines);
    }

    function bindCard(card, id, type) {
      card.querySelector(".remove-card-btn").addEventListener("click", () => {
        delete serviceStates[id];
        card.remove();
        rebuildRows();
        updateTotal();
      });

      if (type === "separator") {
        card.querySelector(".calc-btn").addEventListener("click", () => calcBlock(card, id));
        const rHeader = document.getElementById(`result-header-${id}`);
        rHeader.addEventListener("click", () => {
          const state = serviceStates[id];
          state.collapsed = !state.collapsed;
          document.getElementById(`result-body-${id}`).classList.toggle("collapsed", state.collapsed);
          document.getElementById(`result-chevron-${id}`).classList.toggle("open", !state.collapsed);
        });
        bindSeparatorFileInput(card, id);
      } else if (type === "folding") {
        initFoldingLines(card, id);
      } else if (type === "guillotine") {
        initGuillotine(card, id);
      }
    }

    // ── FILE INPUT BINDING ─────────────────────────────────────────
    function bindSeparatorFileInput(card, id) {
      const input = document.getElementById(`sep-files-${id}`);
      const area = document.getElementById(`upload-area-${id}`);

      input.addEventListener("change", () => {
        addFilesToState(id, input.files);
        input.value = "";
        renderFileList(id);
      });

      area.addEventListener("dragover", e => { e.preventDefault(); area.classList.add("dragover"); });
      area.addEventListener("dragleave", () => area.classList.remove("dragover"));
      area.addEventListener("drop", e => {
        e.preventDefault();
        area.classList.remove("dragover");
        addFilesToState(id, e.dataTransfer.files);
        renderFileList(id);
      });
    }

    function addFilesToState(id, fileList) {
      const state = serviceStates[id];
      if (!state) return;
      const files = [...fileList].filter(f =>
        f.type === "application/pdf" ||
        f.name.endsWith(".pdf") ||
        f.name.endsWith(".docx") ||
        f.type === "application/vnd.openxmlformats-officedocument.wordprocessingml.document"
      );
      files.forEach(f => {
        if (!state.files.find(sf => sf.name === f.name)) {
          state.files.push({ name: f.name, fileRef: f, bytes: null });
        }
      });
    }

    function renderFileList(id) {
      const state = serviceStates[id];
      const listEl = document.getElementById(`file-list-${id}`);
      if (!listEl || !state) return;

      if (!state.files.length) { listEl.innerHTML = ""; return; }

      listEl.innerHTML = state.files.map((f, idx) => `
        <div class="file-chip">
          <span>📄</span>
          <span class="file-chip-name">${escapeHtml(f.name)}</span>
          <button class="file-chip-remove" data-idx="${idx}">×</button>
        </div>
      `).join("");

      listEl.querySelectorAll(".file-chip-remove").forEach(btn => {
        btn.addEventListener("click", () => {
          state.files.splice(Number(btn.dataset.idx), 1);
          renderFileList(id);
        });
      });
    }

    // ── FOLDING CALC ───────────────────────────────────────────────
    async function calcAll() {
      const cards = [...document.querySelectorAll(".service-card")];
      for (const card of cards) {
        if (card.dataset.type === "separator") {
          await calcBlock(card, Number(card.dataset.id));
        }
      }
    }

    async function calcBlock(card, id) {
      const state = serviceStates[id];
      if (!state || state.type !== "separator") return;

      setStatus("Идёт анализ...");

      try {
        await calcSeparator(card, id);
        renderResult(card, id);
        rebuildRows();
        updateTotal();
        setStatus("");
      } catch (err) {
        console.error(err);
        setStatus(err.message || "Ошибка расчёта.", true);
      }
    }

    // ── SEPARATOR CALC ─────────────────────────────────────────────
    async function calcSeparator(card, id) {
      const state = serviceStates[id];

      if (!state.files.length) throw new Error("Добавьте хотя бы один файл.");

      const printMode = document.getElementById(`sep-mode-${id}`).value;
      const copies = Math.max(1, parseInt(document.getElementById(`sep-copies-${id}`).value) || 1);

      const allRows = [];

      for (const fileEntry of state.files) {
        if (!fileEntry.bytes) {
          fileEntry.bytes = new Uint8Array(await fileEntry.fileRef.arrayBuffer());
        }

        const isWord = /\.(docx)$/i.test(fileEntry.name);

        if (isWord) {
          const rows = await analyzeWordFile(fileEntry, printMode, copies, id);
          allRows.push(...rows);
        } else {
          const rows = await analyzeSeparatorPdf(fileEntry, printMode, copies, id, state.files.length);
          allRows.push(...rows);
        }
      }

      const extraRows = (state.rows || []).filter(r => r.isExtra);
      state.rows = [...allRows, ...extraRows];
      state.notes = [];
    }

    async function analyzeWordFile(fileEntry, printMode, copies, blockId) {
      setStatus(`Анализ ${fileEntry.name}...`);

      // Use mammoth to extract page count via page breaks
      const result = await mammoth.extractRawText({ arrayBuffer: fileEntry.bytes.buffer });
      const text = result.value || "";

      // Count form-feed characters (\f) as page breaks + 1
      const pageBreaks = (text.match(/\f/g) || []).length;
      const pageCount = Math.max(1, pageBreaks + 1);

      // Word docs are assumed A4
      const fmt = "A4";
      const colorMode = printMode === "auto" ? "bw" : printMode; // Word: default bw for auto
      const qty = pageCount * copies;
      const price = getSepPrice(fmt, colorMode, qty);

      return [{
        id: makeId(),
        blockId,
        fileName: fileEntry.name,
        fileBytes: null, // Word files can't be split by page here
        actualLabel: `Word, ~${pageCount} стр.`,
        colorMode,
        billedFormat: fmt,
        pages: Array.from({ length: pageCount }, (_, i) => i + 1),
        qty,
        copies,
        unitPrice: price.price,
        tariffCode: price.code,
        tariffLabel: price.label,
        priceLocked: false,
        isExtra: false,
        isSeparator: true,
        isWord: true,
        priceSyncKey: `${colorMode}:${fmt}`
      }];
    }

    async function analyzeSeparatorPdf(fileEntry, printMode, copies, blockId, totalFiles) {
      const pdf = await pdfjsLib.getDocument({ data: fileEntry.bytes.slice() }).promise;
      const groupsMap = new Map();
      const totalPages = pdf.numPages;

      for (let i = 1; i <= totalPages; i++) {
        setProgress(blockId, i / totalPages * 100);
        setStatus(`Анализ ${fileEntry.name}: страница ${i}/${totalPages}`);

        const page = await pdf.getPage(i);
        const vp = page.getViewport({ scale: 1 });

        const wMm = ptToMm(vp.width);
        const hMm = ptToMm(vp.height);

        let colorMode = printMode === "auto" ? await detectColor(page) : printMode;

        const detected = detectFormat(wMm, hMm);
        const billed = detected !== "CUSTOM"
          ? detected
          : detectWideFormat(wMm, hMm) || findSmallestFitting(wMm, hMm) || findNearest(wMm, hMm);

        // Exact size label (not rounded to standard)
        const actualLabel = buildExactSizeLabel(wMm, hMm, detected);

        const priceInfo = getSepPrice(billed, colorMode, copies);
        const groupKey = `${fileEntry.name}||${actualLabel}||${colorMode}||${billed}`;

        if (!groupsMap.has(groupKey)) {
          groupsMap.set(groupKey, {
            fileName: fileEntry.name,
            fileBytes: fileEntry.bytes,
            actualLabel,
            colorMode,
            billedFormat: billed,
            pages: [],
            qty: 0,
            priceInfo
          });
        }

        const g = groupsMap.get(groupKey);
        g.pages.push(i);
        g.qty += copies;
      }

      setProgress(blockId, 0);

      return [...groupsMap.values()].map(g => {
        // Recalculate price using TOTAL qty of this group (pages × copies)
        const finalPrice = getSepPrice(g.billedFormat, g.colorMode, g.qty);
        return {
          id: makeId(),
          blockId,
          fileName: g.fileName,
          fileBytes: g.fileBytes,
          actualLabel: g.actualLabel,
          colorMode: g.colorMode,
          billedFormat: g.billedFormat,
          pages: g.pages,
          qty: g.qty,
          copies,
          unitPrice: finalPrice.price,
          tariffCode: finalPrice.code,
          tariffLabel: finalPrice.label,
          priceLocked: false,
          isExtra: false,
          isSeparator: true,
          priceSyncKey: `${g.colorMode}:${g.billedFormat}`
        };
      });
    }

    // ── GET SEPARATOR PRICE ────────────────────────────────────────
    function getSepPrice(fmt, colorMode, qty) {
      // BW tiered pricing for A4/A3
      if (colorMode === "bw" && PRICES.documentsBW[fmt]) {
        const tiers = PRICES.documentsBW[fmt];
        const tier = tiers.find(t => qty <= t.max) || tiers[tiers.length - 1];
        return { price: tier.price, code: tier.code, label: tier.label };
      }

      // Color A4/A3
      if (colorMode === "color" && PRICES.documentsColor[fmt]) {
        const info = PRICES.documentsColor[fmt];
        return {
          price: info.min, // minimum by default
          code: info.code,
          label: `${info.label} (от ${info.min} до ${info.max} ₽)`
        };
      }

      // Wide format drawings
      if (PRICES.drawingsExact[colorMode]?.[fmt]) {
        const t = PRICES.drawingsExact[colorMode][fmt];
        return { price: t.price, code: t.code, label: `Широкоформатная струйная печать, ${colorMode === "color" ? "цветн" : "ч/б"}, ${fmt}` };
      }

      // Wide multiplied formats
      const wide = parseWideKey(fmt);
      if (wide) {
        const tbl = PRICES.drawingsWide[colorMode]?.[wide.base];
        if (tbl && tbl[wide.n]) {
          return {
            price: tbl[wide.n],
            code: `wide-${colorMode}-${fmt}`,
            label: `Широкоформатная струйная печать, ${colorMode === "color" ? "цветн" : "ч/б"}, ${fmt}`
          };
        }
      }

      return { price: 0, code: "—", label: `Нет тарифа для ${fmt}` };
    }

    // ── RENDER RESULT ──────────────────────────────────────────────
    function renderResult(card, id) {
      const state = serviceStates[id];
      const resultEl = document.getElementById(`result-${id}`);
      const bodyEl = document.getElementById(`result-body-${id}`);
      const subtotalEl = document.getElementById(`result-subtotal-${id}`);

      if (!state.rows || !state.rows.length) {
        resultEl.classList.remove("visible");
        return;
      }

      resultEl.classList.add("visible");
      bodyEl.classList.toggle("collapsed", !!state.collapsed);
      document.getElementById(`result-chevron-${id}`).classList.toggle("open", !state.collapsed);

      const subtotal = state.rows.reduce((s, r) => s + r.qty * r.unitPrice, 0);
      subtotalEl.textContent = money(subtotal);

      let html = "";

      // Download buttons for separator
      const sepRows = state.rows.filter(r => r.isSeparator);
      if (sepRows.length) {
        html += `<div class="download-actions">
          <button type="button" class="btn-secondary btn-sm download-all-btn" data-id="${id}">⬇ Скачать всё (ZIP)</button>
          <button type="button" class="btn-secondary btn-sm merge-rows-btn" data-id="${id}" title="Объединить строки с одинаковым форматом печати — количество суммируется">⊞ Объединить строки</button>
        </div>`;
      }

      html += `<div class="table-wrap"><table>
        <thead>
          <tr>
            <th style="min-width:180px;text-align:center">Тариф</th>
            <th style="text-align:center">Размер в файле</th>
            <th style="min-width:140px;text-align:center">Формат печати</th>
            <th style="text-align:center">Кол-во</th>
            <th style="text-align:center">Цена / ед.</th>
            <th style="text-align:center">Сумма</th>
            <th style="text-align:center"></th>
          </tr>
        </thead>
        <tbody>
          ${state.rows.map(row => renderRowHtml(row)).join("")}
        </tbody>
      </table></div>`;

      if (state.notes && state.notes.length) {
        html += `<div class="note-box">${state.notes.map(n => `• ${escapeHtml(n)}`).join("<br>")}</div>`;
      }

      bodyEl.innerHTML = html;
      bindResultEvents(bodyEl, card, id);
    }

    // All selectable formats for the format dropdown
    const ALL_FORMATS = ["A6","A5","A4","A3","A2","A1","A0",
      "A4x3","A4x4","A4x5","A4x6","A4x7","A4x8",
      "A3x3","A3x4","A3x5","A3x6","A3x7","A3x8",
      "A2x3","A2x4","A2x5","A2x6"];

    function renderRowHtml(row) {
      const sum = row.qty * row.unitPrice;

      const priceCell = `
        <div class="price-edit-box">
          <input type="number" class="row-price-input row-price-editor" data-row-id="${row.id}"
                 value="${row.unitPrice.toFixed(2)}" min="0" step="0.01" style="width:90px;">
          <button type="button" class="icon-btn lock-btn ${row.priceLocked ? "locked" : ""}" data-row-id="${row.id}"
                  title="${row.priceLocked ? "Цена зафиксирована" : "Зафиксировать цену"}">
            ${row.priceLocked ? "🔒" : "🔓"}
          </button>
        </div>`;

      const removeBtn = row.isExtra
        ? `<button type="button" class="icon-btn remove-extra" data-row-id="${row.id}" title="Удалить">✕</button>`
        : "";

      const downloadBtn = row.isSeparator && !row.isWord && row.fileBytes
        ? `<button type="button" class="btn-secondary btn-xs dl-row-btn" data-row-id="${row.id}">⬇ PDF</button>`
        : "";

      // Format select — only for separator rows, folding rows show "—"
      const formatCell = row.isSeparator
        ? `<select class="row-format-select" data-row-id="${row.id}" style="height:36px;padding:6px 10px;font-size:13px;">
            ${ALL_FORMATS.map(f => `<option value="${f}" ${f === row.billedFormat ? "selected" : ""}>${escapeHtml(formatLabel(f))}</option>`).join("")}
           </select>`
        : escapeHtml(row.billedFormat || "—");

      return `
        <tr data-row-id="${row.id}">
          <td style="word-break:keep-all;overflow-wrap:normal;hyphens:none;text-align:left;min-width:180px">
            <div class="cell-code">${escapeHtml(row.tariffCode || "—")}</div>
            <div class="cell-label" style="word-break:keep-all;overflow-wrap:normal;hyphens:none;white-space:normal">${escapeHtml(row.tariffLabel || "—")}</div>
            ${downloadBtn}
          </td>
          <td style="text-align:center" class="cell-size">${escapeHtml(row.actualLabel || "—")}</td>
          <td style="text-align:center">${formatCell}</td>
          <td style="text-align:center">
            <input type="number" class="row-qty-input row-qty-editor" data-row-id="${row.id}"
                   value="${row.qty}" min="1" step="1">
          </td>
          <td style="text-align:center">${priceCell}</td>
          <td class="right sum-cell" data-row-id="${row.id}" style="text-align:right">${money(sum)}</td>
          <td style="text-align:center">${removeBtn}</td>
        </tr>`;
    }

    function bindResultEvents(bodyEl, card, id) {
      const state = serviceStates[id];

      // Download all
      bodyEl.querySelector(".download-all-btn")?.addEventListener("click", () => downloadAll(id));

      // Merge rows
      bodyEl.querySelector(".merge-rows-btn")?.addEventListener("click", () => {
        mergeRowsByFormat(state, card, id);
      });

      // Download row
      bodyEl.querySelectorAll(".dl-row-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          const row = calculatedRows.find(r => r.id === btn.dataset.rowId);
          if (row) downloadRowPdf(row);
        });
      });

      // Remove extra
      bodyEl.querySelectorAll(".remove-extra").forEach(btn => {
        btn.addEventListener("click", () => {
          state.rows = state.rows.filter(r => r.id !== btn.dataset.rowId);
          rebuildRows();
          renderResult(card, id);
          updateTotal();
        });
      });

      // Price edit
      bodyEl.querySelectorAll(".row-price-editor").forEach(inp => {
        inp.addEventListener("input", () => {
          const row = calculatedRows.find(r => r.id === inp.dataset.rowId);
          if (!row) return;
          row.unitPrice = Math.max(0, parseFloat(inp.value.replace(",", ".")) || 0);
          updateRowSum(inp.dataset.rowId);
          updateSubtotal(id);
          updateTotal();
        });
      });

      // Lock
      bodyEl.querySelectorAll(".lock-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          const row = calculatedRows.find(r => r.id === btn.dataset.rowId);
          if (!row) return;
          row.priceLocked = !row.priceLocked;
          syncStateFromRows(id);
          renderResult(card, id);
        });
      });

      // Format select change
      bodyEl.querySelectorAll(".row-format-select").forEach(sel => {
        sel.addEventListener("change", () => {
          const row = calculatedRows.find(r => r.id === sel.dataset.rowId);
          if (!row) return;
          row.billedFormat = sel.value;
          if (!row.priceLocked) {
            const newPrice = getSepPrice(row.billedFormat, row.colorMode, row.qty);
            row.unitPrice = newPrice.price;
            row.tariffCode = newPrice.code;
            row.tariffLabel = newPrice.label;
            // update tariff cell
            const tr = sel.closest("tr");
            if (tr) {
              tr.querySelector(".cell-code").textContent = row.tariffCode || "—";
              tr.querySelector(".cell-label").textContent = row.tariffLabel || "—";
              const priceInput = tr.querySelector(".row-price-editor");
              if (priceInput) priceInput.value = row.unitPrice.toFixed(2);
            }
          }
          updateRowSum(row.id);
          updateSubtotal(id);
          syncStateFromRows(id);
          updateTotal();
        });
      });

      // Qty edit
      bodyEl.querySelectorAll(".row-qty-editor").forEach(inp => {
        inp.addEventListener("input", () => {
          const row = calculatedRows.find(r => r.id === inp.dataset.rowId);
          if (!row) return;
          row.qty = Math.max(1, parseInt(inp.value) || 1);

          // Recalc price based on qty if not locked
          if (!row.priceLocked && row.isSeparator) {
            const newPrice = getSepPrice(row.billedFormat, row.colorMode, row.qty);
            row.unitPrice = newPrice.price;
            row.tariffCode = newPrice.code;
            row.tariffLabel = newPrice.label;

            const tr = inp.closest("tr");
            if (tr) {
              tr.querySelector(".cell-code").textContent = row.tariffCode || "—";
              tr.querySelector(".cell-label").textContent = row.tariffLabel || "—";
              const priceInput = tr.querySelector(".row-price-editor");
              if (priceInput) priceInput.value = row.unitPrice.toFixed(2);
            }
          }

          updateRowSum(row.id);
          updateSubtotal(id);
          syncStateFromRows(id);
          updateTotal();
        });
      });
    }

    function updateRowSum(rowId) {
      const row = calculatedRows.find(r => r.id === rowId);
      const cell = document.querySelector(`.sum-cell[data-row-id="${rowId}"]`);
      if (row && cell) cell.textContent = money(row.qty * row.unitPrice);
    }

    function updateSubtotal(id) {
      const state = serviceStates[id];
      if (!state) return;
      const sub = state.rows.reduce((s, r) => s + r.qty * r.unitPrice, 0);
      const el = document.getElementById(`result-subtotal-${id}`);
      if (el) el.textContent = money(sub);
    }

    function syncStateFromRows(id) {
      const state = serviceStates[id];
      if (!state) return;
      state.rows = state.rows.map(r => calculatedRows.find(cr => cr.id === r.id) || r);
    }

    // Merge rows that share the same billedFormat + colorMode — sum their qty,
    // merge their page arrays, recalc price for new total qty
    function mergeRowsByFormat(state, card, id) {
      const sepRows = state.rows.filter(r => r.isSeparator);
      const otherRows = state.rows.filter(r => !r.isSeparator);

      // Group by billedFormat + colorMode
      const groups = new Map();
      for (const row of sepRows) {
        const key = `${row.billedFormat}||${row.colorMode || ""}`;
        if (!groups.has(key)) {
          groups.set(key, []);
        }
        groups.get(key).push(row);
      }

      const merged = [];
      for (const [, rows] of groups) {
        if (rows.length === 1) {
          merged.push(rows[0]);
          continue;
        }

        // Merge: sum qty, combine pages, use first row as base
        const base = { ...rows[0] };
        base.id = makeId(); // new id for merged row
        base.qty = rows.reduce((s, r) => s + r.qty, 0);
        base.pages = rows.flatMap(r => r.pages || []).sort((a, b) => a - b);
        base.actualLabel = rows.map(r => r.actualLabel).join(", ");

        // Recalc price for merged qty
        if (!base.priceLocked) {
          const p = getSepPrice(base.billedFormat, base.colorMode, base.qty);
          base.unitPrice = p.price;
          base.tariffCode = p.code;
          base.tariffLabel = p.label;
        }

        merged.push(base);
      }

      state.rows = [...merged, ...otherRows];
      rebuildRows();
      renderResult(card, id);
      updateTotal();
    }

    // ── DOWNLOAD ───────────────────────────────────────────────────

    // Human-readable color label
    function colorLabel(mode) {
      return mode === "color" ? "цвет" : "чб";
    }

    // Build a clean filename: "Формат_цвет_стр1-5.pdf"
    function buildFileName(billedFormat, colorMode, pages, sourceFileName) {
      const fmt = sanitize(billedFormat || "формат");
      const clr = colorLabel(colorMode);
      const pages_str = compressRanges(pages).replace(/,\s*/g, "_");
      const base = sourceFileName
        ? "_" + sanitize(sourceFileName.replace(/\.(pdf|docx)$/i, ""))
        : "";
      return `${fmt}_${clr}${base}_стр${pages_str}.pdf`;
    }

    // Single-row download — pages strictly from this row
    async function downloadRowPdf(row) {
      if (!row.fileBytes || !row.pages?.length) {
        setStatus("Нет данных для скачивания.", true);
        return;
      }
      try {
        setStatus("Создаётся PDF...");
        const bytes = await buildPdf(row.fileBytes, row.pages);
        const name = buildFileName(row.billedFormat, row.colorMode, row.pages, row.fileName);
        downloadBytes(bytes, name, "application/pdf");
        setStatus("Файл скачан.");
      } catch (e) {
        console.error(e);
        setStatus("Ошибка при создании PDF.", true);
      }
    }

    // ZIP download — re-group all separator rows by billedFormat+colorMode+sourceFile,
    // collect their page lists, build one PDF per group, name clearly
    async function downloadAll(id) {
      const state = serviceStates[id];
      if (!state) return;

      const sepRows = state.rows.filter(r => r.isSeparator && !r.isWord && r.fileBytes && r.pages?.length);
      if (!sepRows.length) {
        setStatus("Нет файлов для скачивания.", true);
        return;
      }

      setStatus("Собирается архив...");

      try {
        const zip = new JSZip();

        // Group by sourceFile + billedFormat + colorMode
        // This respects whatever the user has set in the "Формат печати" column
        const groups = new Map();
        for (const row of sepRows) {
          const key = `${row.fileName || ""}||${row.billedFormat}||${row.colorMode || "bw"}`;
          if (!groups.has(key)) {
            groups.set(key, {
              billedFormat: row.billedFormat,
              colorMode: row.colorMode || "bw",
              fileName: row.fileName,
              fileBytes: row.fileBytes,
              pages: []
            });
          }
          const g = groups.get(key);
          // Merge pages (in case multiple rows share same key after user edits)
          g.pages.push(...row.pages);
        }

        const usedNames = new Set();

        for (const g of groups.values()) {
          // Deduplicate and sort pages
          const pages = [...new Set(g.pages)].sort((a, b) => a - b);
          const bytes = await buildPdf(g.fileBytes, pages);

          let fname = buildFileName(g.billedFormat, g.colorMode, pages, g.fileName);

          // Avoid duplicate filenames in archive
          if (usedNames.has(fname)) {
            fname = fname.replace(".pdf", `_${makeId().slice(0, 4)}.pdf`);
          }
          usedNames.add(fname);

          zip.file(fname, bytes);
        }

        const blob = await zip.generateAsync({ type: "blob" });

        // Name the ZIP after the service block
        const card = document.querySelector(`.service-card[data-id="${id}"]`);
        const serviceName = card?.querySelector(".card-name-input")?.value?.trim() || `разделитель_${id}`;
        downloadBytes(blob, `${sanitize(serviceName)}.zip`, "application/zip");

        setStatus(`Архив скачан: ${groups.size} файл(ов).`);
      } catch (e) {
        console.error(e);
        setStatus("Ошибка при создании архива.", true);
      }
    }

    async function buildPdf(sourceBytes, pages) {
      const src = await PDFDocument.load(sourceBytes.slice());
      const out = await PDFDocument.create();
      const copied = await out.copyPages(src, pages.map(p => p - 1));
      copied.forEach(p => out.addPage(p));
      return out.save();
    }

    function downloadBytes(data, name, mime) {
      const blob = data instanceof Blob ? data : new Blob([data], { type: mime });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = name;
      a.style.display = "none";
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 3000);
    }

    // ── ROWS / TOTAL ───────────────────────────────────────────────
    function rebuildRows() {
      calculatedRows = [];
      Object.values(serviceStates).forEach(state => {
        if (state.rows) calculatedRows.push(...state.rows);
      });
    }

    function updateTotal() {
      let total = calculatedRows.reduce((s, r) => s + r.qty * r.unitPrice, 0);

      // Add folding totals (live, not in calculatedRows)
      Object.values(serviceStates).forEach(state => {
        if (state.type === "folding" && state.foldLines) {
          state.foldLines.forEach(line => {
            const { price } = calcLineFoldPrice(line.direction, line.format);
            total += price * (line.qty || 1);
          });
        }
      });

      const hasAnything = calculatedRows.length > 0 ||
        Object.values(serviceStates).some(s => s.type === "folding" && s.foldLines?.length);

      if (hasAnything) {
        totalBlock.classList.add("visible");
        totalAmount.textContent = money(total);
      } else {
        totalBlock.classList.remove("visible");
      }
    }

    // ── PROGRESS ───────────────────────────────────────────────────
    function setProgress(id, pct) {
      const wrap = document.getElementById(`progress-wrap-${id}`);
      const bar = document.getElementById(`progress-bar-${id}`);
      if (!wrap || !bar) return;

      if (pct > 0 && pct < 100) {
        wrap.classList.add("visible");
        bar.style.width = pct + "%";
      } else {
        wrap.classList.remove("visible");
        bar.style.width = "0%";
      }
    }

    // ── STATUS ─────────────────────────────────────────────────────
    function setStatus(text, isError = false) {
      if (!text) {
        statusEl.style.display = "none";
        return;
      }
      statusEl.style.display = "flex";
      statusEl.textContent = text;
      statusEl.className = "status-pill" + (isError ? " error" : "");
    }

    function clearAll() {
      container.innerHTML = "";
      blockCounter = 1;
      calculatedRows = [];
      Object.keys(serviceStates).forEach(k => delete serviceStates[k]);
      totalBlock.classList.remove("visible");
      setStatus("");
      addBlock("separator");
    }

    // ── PDF ANALYSIS ───────────────────────────────────────────────
    async function detectColor(page) {
      const vp = page.getViewport({ scale: 0.5 });
      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d", { willReadFrequently: true });
      canvas.width = Math.max(1, Math.floor(vp.width));
      canvas.height = Math.max(1, Math.floor(vp.height));

      await page.render({ canvasContext: ctx, viewport: vp }).promise;
      const { data, width, height } = ctx.getImageData(0, 0, canvas.width, canvas.height);

      let colorPx = 0;
      for (let y = 0; y < height; y += SAMPLE_STEP) {
        for (let x = 0; x < width; x += SAMPLE_STEP) {
          const i = (y * width + x) * 4;
          const r = data[i], g = data[i + 1], b = data[i + 2], a = data[i + 3];
          if (a < 10) continue;
          if (Math.abs(r - g) > COLOR_TOLERANCE || Math.abs(g - b) > COLOR_TOLERANCE || Math.abs(r - b) > COLOR_TOLERANCE) {
            if (++colorPx >= 5) return "color";
          }
        }
      }

      return "bw";
    }

    function detectFormat(w, h) {
      for (const [name, size] of Object.entries(FORMATS)) {
        const n = Math.abs(w - size.w) <= TOLERANCE_MM && Math.abs(h - size.h) <= TOLERANCE_MM;
        const r = Math.abs(w - size.h) <= TOLERANCE_MM && Math.abs(h - size.w) <= TOLERANCE_MM;
        if (n || r) return name;
      }
      return "CUSTOM";
    }

    function findSmallestFitting(w, h) {
      const short = Math.min(w, h), long = Math.max(w, h);
      for (const name of ["A6","A5","A4","A3","A2","A1","A0"]) {
        const s = FORMATS[name];
        const fs = Math.min(s.w, s.h), fl = Math.max(s.w, s.h);
        if (short <= fs + TOLERANCE_MM && long <= fl + TOLERANCE_MM) return name;
      }
      return null;
    }

    // Detect wide/roll formats like A4x3, A3x4, A2x3 etc.
    // Logic: one side matches base format short side, other side ≈ base_long × N
    function detectWideFormat(w, h) {
      const short = Math.min(w, h);
      const long  = Math.max(w, h);

      // Bases that have wide variants in the pricelist
      const bases = ["A4", "A3", "A2"];
      let best = null;
      let bestDiff = TOLERANCE_MM * 3; // must be within tolerance to match

      for (const base of bases) {
        const s = FORMATS[base];
        const baseShort = Math.min(s.w, s.h); // shorter side (e.g. A4: 210)
        const baseStep  = Math.max(s.w, s.h); // longer side used as step (e.g. A4: 297)

        // Short side must match
        const shortDiff = Math.abs(short - baseShort);
        if (shortDiff > TOLERANCE_MM) continue;

        // Find the multiplier: how many base steps fit the long side
        const rawN = long / baseStep;
        // Try rounding to nearest integer ≥ 2
        for (const n of [Math.round(rawN), Math.floor(rawN), Math.ceil(rawN)]) {
          if (n < 2) continue;
          const expectedLong = baseStep * n;
          const diff = Math.abs(long - expectedLong) + shortDiff;
          if (diff < bestDiff) {
            bestDiff = diff;
            best = `${base}x${n}`;
          }
        }
      }

      return best; // e.g. "A4x4", "A3x3", or null
    }

    function findNearest(w, h) {
      let best = "A4", bestDist = Infinity;
      Object.entries(FORMATS).forEach(([name, size]) => {
        const d = Math.min(
          Math.abs(w - size.w) + Math.abs(h - size.h),
          Math.abs(w - size.h) + Math.abs(h - size.w)
        );
        if (d < bestDist) { bestDist = d; best = name; }
      });
      return best;
    }

    // Exact size label — shows real mm from file without rounding to standard
    function buildExactSizeLabel(wMm, hMm, detectedFmt) {
      const w = Math.round(wMm * 10) / 10;
      const h = Math.round(hMm * 10) / 10;
      // Show exact dimensions
      return `${w} × ${h} мм`;
    }

    function parseWideKey(key) {
      const m = /^([A][234])x(\d+)$/i.exec(String(key));
      return m ? { base: m[1].toUpperCase(), n: Number(m[2]) } : null;
    }

    // ── UTILS ──────────────────────────────────────────────────────
    function ptToMm(pt) { return pt * 25.4 / 72; }

    function formatLabel(key) {
      if (FORMATS[key]) return `${key} (${FORMATS[key].w}×${FORMATS[key].h} мм)`;
      const m = /^([A][234])x(\d+)$/i.exec(key);
      if (m) {
        const base = m[1].toUpperCase();
        const n = Number(m[2]);
        return `${base}×${n} (${FORMATS[base].w * n}×${FORMATS[base].h} мм)`;
      }
      return key;
    }

    function money(v) {
      return `${Number(v).toFixed(2).replace(".", ",")} ₽`;
    }

    function escapeHtml(t) {
      return String(t).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }

    function sanitize(v) {
      return String(v || "").replace(/[\\/:*?"<>|]+/g, "_");
    }

    function makeId() {
      return "r_" + Math.random().toString(36).slice(2, 10);
    }

    function compressRanges(pages) {
      if (!pages?.length) return "";
      const sorted = [...new Set(pages)].sort((a, b) => a - b);
      const ranges = [];
      let start = sorted[0], prev = sorted[0];
      for (let i = 1; i < sorted.length; i++) {
        if (sorted[i] === prev + 1) { prev = sorted[i]; continue; }
        ranges.push(start === prev ? `${start}` : `${start}-${prev}`);
        start = prev = sorted[i];
      }
      ranges.push(start === prev ? `${start}` : `${start}-${prev}`);
      return ranges.join(",");
    }

  </script>
